<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PenTest Pro">
<meta name="theme-color" content="#09090f">
<title>PenTest Pro — Elite Framework</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PenTest Pro — Design System v3  "Precision"
   True black surfaces  ·  Pure white text  ·  Electric blue accent
   No colour tint in neutrals. Every colour earns its place.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

*, *::before, *::after {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  margin: 0; padding: 0;
}

:root {
  /* ── Backgrounds (pure neutral, zero tint) ── */
  --bg:  #000000;   /* page background — absolute black */
  --s1:  #0c0c0c;   /* card background */
  --s2:  #141414;   /* input, nested element */
  --s3:  #1c1c1c;   /* hover state */
  --s4:  #242424;   /* pressed / selected */

  /* ── Borders ── */
  --bdr:  rgba(255,255,255,.07);   /* default — barely visible */
  --bdr2: rgba(255,255,255,.12);   /* stronger / hover */
  --bdr3: rgba(255,255,255,.20);   /* active / focus */

  /* ── Text (no blue tint — pure neutral) ── */
  --t1: #ffffff;   /* headings, primary */
  --t2: #999999;   /* secondary / helper */
  --t3: #555555;   /* muted / placeholder */

  /* ── Electric blue — single interactive accent ── */
  --accent:    #3b82f6;
  --accent-hi: #60a5fa;
  --accent-lo: #2563eb;
  --accent-bg: rgba(59,130,246,.08);
  --accent-bd: rgba(59,130,246,.28);

  /* ── Severity palette ── */
  --c-crit:    #f04438;
  --c-high:    #f97316;
  --c-med:     #f59e0b;
  --c-low:     #22c55e;
  --c-info:    #64748b;
  --c-crit-bg: rgba(240,68,56,.08);
  --c-high-bg: rgba(249,115,22,.08);
  --c-med-bg:  rgba(245,158,11,.08);
  --c-low-bg:  rgba(34,197,94,.08);
  --c-info-bg: rgba(100,116,139,.08);

  /* ── Terminal code colours ── */
  --code-cmd: #22d3ee;   /* commands — cyan */
  --code-var: #fbbf24;   /* {VARIABLES} — amber */
  --code-cmt: #3f3f46;   /* # comments — dark */
  --code-ex:  #4ade80;   /* examples — green */
  --code-bg:  #000000;   /* code block background */

  /* ── Design tokens ── */
  --radius-sm:  6px;
  --radius:    10px;
  --radius-lg: 12px;
  --radius-xl: 20px;
  --radius-pill: 99px;
  --transition: .15s cubic-bezier(.4,0,.2,1);

  /* ── iPhone safe areas ── */
  --sat: env(safe-area-inset-top,    0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left,   0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--t1);
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter',
               'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'kern' 1;
}

.mono {
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code',
               Menlo, Consolas, monospace;
}

#root {
  height: 100dvh;
  height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-left: var(--sal);
}

#err {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(240,68,56,.1);
  color: #fca5a5;
  padding: 12px 16px;
  font-size: 12px;
  z-index: 9999;
  display: none;
  font-family: monospace;
  border-bottom: 1px solid rgba(240,68,56,.4);
}


/* ━━ LOCK SCREEN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#lockscreen{
  position:fixed;inset:0;z-index:10000;
  background:var(--bg);
  display:none;align-items:center;justify-content:center;
  padding:24px;
  padding-top:calc(24px + var(--sat));
  padding-bottom:calc(24px + var(--sab));
}
.lock-card{
  width:100%;max-width:360px;
  background:var(--s1);
  border:1px solid var(--bdr2);
  border-radius:var(--radius-xl);
  padding:32px 28px;
  display:flex;flex-direction:column;
  animation:fadeup .3s ease both;
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,0.04);
}
.lock-brand{
  font-size:12px;font-weight:700;color:var(--t3);
  text-align:center;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:22px;
}
.lock-title{font-size:20px;font-weight:800;color:var(--t1);text-align:center;margin-bottom:10px;letter-spacing:-.04em}
.lock-body{font-size:12px;color:var(--t2);text-align:center;line-height:1.65;margin-bottom:22px}
.lock-body.lock-danger{color:var(--c-crit)}
.lock-input{
  width:100%;background:var(--s2);
  border:1px solid var(--bdr);border-radius:var(--radius-sm);
  padding:12px 14px;color:var(--t1);
  font-size:15px;font-family:inherit;
  outline:none;margin-bottom:10px;
  transition:border-color var(--transition);
}
.lock-input:focus{border-color:var(--accent-bd)}
.lock-error{font-size:12px;color:var(--c-crit);min-height:16px;margin-bottom:8px;text-align:center}
.lock-btn{width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:5px}
.lock-btn-secondary{
  width:100%;justify-content:center;padding:10px;font-size:13px;margin-top:10px;
  background:none;border:1px solid var(--bdr);border-radius:var(--radius-sm);
  color:var(--t2);cursor:pointer;font-family:inherit;transition:all var(--transition);
}
.lock-btn-secondary:hover{background:var(--s3);color:var(--t1)}
.lock-note{font-size:11px;color:var(--t3);text-align:center;margin-top:14px;line-height:1.5}
.lock-forgot{
  background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;
  font-family:inherit;text-align:center;margin-top:16px;width:100%;
  text-decoration:underline;text-underline-offset:3px;transition:color var(--transition);
}
.lock-forgot:hover{color:var(--t2)}


/* ━━ TOPBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#topbar {
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-bottom: 1px solid var(--bdr);
  padding: 0 14px;
  padding-top: var(--sat);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  min-height: calc(52px + var(--sat));
  position: relative;
  z-index: 20;
}

#hambtn {
  background: none;
  border: 1px solid var(--bdr2);
  border-radius: var(--radius-sm);
  color: var(--t2);
  width: 34px; height: 34px;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
}
#hambtn:hover, #hambtn.on {
  background: var(--s3);
  color: var(--t1);
  border-color: var(--bdr3);
}

/* Traffic light dots — shown on desktop only (purely decorative) */
.dots { display: none; gap: 5px; flex-shrink: 0; }
@media (min-width: 1024px) { .dots { display: flex; } }
.dot { width: 8px; height: 8px; border-radius: 50%; }

#engbtn {
  background: none; border: none;
  color: var(--t1);
  font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; padding: 0;
  display: flex; align-items: center; gap: 6px;
  transition: color var(--transition);
  max-width: 160px; flex-shrink: 0;
  letter-spacing: -.02em;
}
#engbtn:hover { color: var(--accent-hi); }

#searchbox {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
  background: var(--s2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  padding: 0 11px;
  height: 34px;
  min-width: 0;
  transition: border-color var(--transition);
}
#searchbox:focus-within { border-color: var(--accent-bd); }
#searchinp {
  background: none; border: none; outline: none;
  color: var(--t1); font-size: 13px; font-family: inherit;
  width: 100%; min-width: 0;
}
#searchinp::placeholder { color: var(--t3); }
.srchico { color: var(--t3); font-size: 13px; flex-shrink: 0; }
#clrbtn {
  background: none; border: none; color: var(--t3);
  cursor: pointer; font-size: 12px; flex-shrink: 0;
  display: none; padding: 0; line-height: 1;
  transition: color var(--transition);
}
#clrbtn:hover { color: var(--t2); }

#totalring { flex-shrink: 0; }

#langbtn {
  background: none;
  border: 1px solid var(--bdr2);
  border-radius: var(--radius-sm);
  color: var(--t1);
  cursor: pointer; padding: 4px 10px;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
  transition: all var(--transition);
  white-space: nowrap; letter-spacing: .04em;
}
#langbtn:hover { background: var(--s3); border-color: var(--bdr3); }

#resetbtn {
  background: none;
  border: 1px solid rgba(240,68,56,.2);
  border-radius: var(--radius-sm);
  color: var(--c-crit);
  cursor: pointer; padding: 4px 8px;
  font-size: 11px; flex-shrink: 0;
  transition: all var(--transition);
}
#resetbtn:hover { background: var(--c-crit-bg); border-color: rgba(240,68,56,.5); }

/* ━━ SECTION NAV (tablet/desktop horizontal tabs) ━━━━━━━━━━━━━━━━━━━━━ */
#secnav {
  background: var(--bg);
  border-bottom: 1px solid var(--bdr);
  display: flex; overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  padding: 0 10px;
}
#secnav::-webkit-scrollbar { display: none; }

.secbtn {
  background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  height: 42px;
  color: var(--t3);
  font-size: 13px; font-weight: 500;
  white-space: nowrap;
  transition: all var(--transition);
  flex-shrink: 0;
  letter-spacing: -.01em;
}
.secbtn .sico { font-size: 14px; line-height: 1; }
.secbtn:hover { color: var(--t1); }
.secbtn.on { color: var(--t1); font-weight: 600; border-bottom-color: var(--accent); }

/* ━━ PHASE PILLS (compact horizontal scrolling) ━━━━━━━━━━━━━━━━━━━━━━━ */
#phasenav {
  background: var(--bg);
  border-bottom: 1px solid var(--bdr);
  display: flex; overflow-x: auto;
  padding: 9px 14px; gap: 8px;
  flex-shrink: 0;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#phasenav::-webkit-scrollbar { display: none; }

.ptab {
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-pill);
  cursor: pointer;
  padding: 6px 14px;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit;
  transition: all var(--transition);
  flex-shrink: 0;
}
.ptab:hover { background: var(--s3); border-color: var(--bdr2); }
.ptab .pico { font-size: 13px; line-height: 1; }
.ptab .plbl { font-size: 11px; font-weight: 600; color: var(--t2); }
.ptab.on { border-color: transparent; }
.ptab.on .plbl { color: #fff; font-weight: 700; }
.ptab-done {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,.5);
  flex-shrink: 0;
}

/* ━━ WRAP / DRAWER / MASK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#wrap { flex: 1; display: flex; overflow: hidden; position: relative; }

#mask {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 99; display: none;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
#mask.on { display: block; }

#drawer {
  position: absolute; top: 0; left: 0; height: 100%;
  width: 280px;
  background: var(--s1);
  border-right: 1px solid var(--bdr);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  z-index: 100;
  transform: translateX(-105%);
  transition: transform .26s cubic-bezier(.4,0,.2,1);
  flex-shrink: 0;
}
#drawer.on { transform: translateX(0); }

.sidebar-phases {
  display: none; flex-direction: column;
  padding: 8px; gap: 2px;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.sph-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; background: none; border: none;
  border-radius: var(--radius-sm);
  padding: 8px 10px; cursor: pointer;
  font-family: inherit; text-align: left;
  transition: background var(--transition);
}
.sph-btn:hover { background: var(--s3); }
.sph-btn.on   { background: var(--s2); }
.sph-ico { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
.sph-info { flex: 1; min-width: 0; }
.sph-lbl { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sph-pct { font-size: 10px; color: var(--t3); margin-top: 2px; }

.drwhdr {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--bdr);
  position: sticky; top: 0;
  background: var(--s1); z-index: 1; flex-shrink: 0;
}
.drwphase { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.drwdesc  { font-size: 11px; color: var(--t2); line-height: 1.4; }

.drwbtn {
  width: 100%; background: none; border: none;
  border-left: 2px solid transparent;
  border-bottom: 1px solid rgba(255,255,255,.02);
  padding: 10px 16px; text-align: left;
  cursor: pointer; font-family: inherit;
  transition: background var(--transition); display: block;
}
.drwbtn:hover { background: var(--s3); }
.drwbtn.on    { background: var(--s2); border-bottom-color: transparent; }
.drwtitle {
  font-size: 12px; line-height: 1.4; color: var(--t2);
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 6px;
  margin-bottom: 6px;
}
.drwbtn.on .drwtitle { color: var(--t1); font-weight: 600; }

/* ━━ MAIN CONTENT AREA ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#stephdr {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.sphcrumb {
  font-size: 11px; color: var(--t3);
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .06em; font-weight: 600;
}
.sphrow { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.sphtitle {
  font-size: 22px; font-weight: 800;
  color: var(--t1); letter-spacing: -.04em;
  line-height: 1.15; margin-bottom: 5px;
}
.sphsumm { font-size: 13px; color: var(--t2); line-height: 1.6; max-width: 520px; }

.pbar { height: 2px; background: var(--bdr); border-radius: 1px; overflow: hidden; }
.pfill { height: 100%; border-radius: 1px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* ━━ TAB BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#tabbar {
  display: flex;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0; overflow-x: auto;
  scrollbar-width: none;
  padding: 0 16px;
  background: var(--bg);
}
#tabbar::-webkit-scrollbar { display: none; }
.tbtn {
  background: none; border: none;
  border-bottom: 2px solid transparent;
  padding: 0 16px; height: 42px;
  cursor: pointer; font-family: inherit;
  color: var(--t3); font-size: 13px; font-weight: 500;
  white-space: nowrap;
  transition: all var(--transition);
}
.tbtn:hover { color: var(--t1); }
.tbtn.on { color: var(--t1); font-weight: 600; border-bottom-color: var(--accent); }

#content {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 20px;
}

/* ━━ STEP NAVIGATION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#stepnav {
  border-top: 1px solid var(--bdr);
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
  background: var(--bg);
}
.snbtn {
  background: var(--s1);
  border: 1px solid var(--bdr2);
  border-radius: var(--radius-sm);
  color: var(--t2); font-size: 12px; font-weight: 500;
  cursor: pointer; padding: 7px 16px;
  font-family: inherit;
  transition: all var(--transition);
}
.snbtn:hover:not(:disabled) { background: var(--s3); color: var(--t1); border-color: var(--bdr3); }
.snbtn:disabled { opacity: .3; cursor: not-allowed; }
.sdots { display: flex; gap: 5px; align-items: center; }
.sdot  {
  height: 5px; border-radius: 3px; cursor: pointer;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  flex-shrink: 0; min-width: 5px;
}

/* ━━ BOTTOM SECTION TAB BAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#bottomnav {
  background: rgba(0,0,0,.92);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-top: 0.5px solid rgba(255,255,255,.08);
  display: flex; justify-content: space-around;
  align-items: stretch; flex-shrink: 0;
  padding-bottom: var(--sab);
}

.bni {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 9px 4px 8px;
  background: none; border: none; cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  min-height: 54px;
  transition: opacity var(--transition);
}
.bni:active { opacity: .6; }
.bni-icon {
  font-size: 22px; line-height: 1; display: block;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
}
.bni-lbl {
  font-size: 10px; color: var(--t3); font-weight: 500;
  white-space: nowrap; text-align: center;
  transition: color var(--transition);
}
.bni.on .bni-icon { transform: scale(1.1); }
.bni.on .bni-lbl  { color: var(--accent); font-weight: 700; }

/* ━━ MORE SHEET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#more_sheet {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.more-inner {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  border-top: 1px solid var(--bdr2);
  padding: 12px 18px 0;
  padding-bottom: calc(18px + var(--sab));
  animation: slideUp .26s cubic-bezier(.32,0,.67,0);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.more-handle  { width: 36px; height: 4px; background: var(--bdr3); border-radius: 2px; margin: 0 auto 18px; }
.more-title   { font-size: 11px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px; }
.more-grid    { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 8px; }
.more-btn {
  background: var(--s2); border: 1px solid var(--bdr);
  border-radius: var(--radius-lg);
  padding: 14px 6px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; font-family: inherit;
  transition: all var(--transition);
}
.more-btn:hover, .more-btn.on {
  border-color: var(--accent-bd);
  background: var(--accent-bg);
}
.more-btn-icon { font-size: 22px; line-height: 1; }
.more-btn-lbl  { font-size: 10px; color: var(--t2); text-align: center; line-height: 1.3; font-weight: 500; }

/* ━━ SECTION BODY (non-framework sections) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#secbody { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.sec-hdr {
  padding: 20px 24px;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 14px;
  flex-wrap: wrap;
  background: var(--bg);
}
.sec-title {
  font-size: 22px; font-weight: 800;
  color: var(--t1); letter-spacing: -.04em;
  display: flex; align-items: center; gap: 10px;
}
.sec-subtitle { font-size: 12px; color: var(--t2); margin-top: 3px; line-height: 1.5; }
.sec-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 14px;
}

/* ━━ ANIMATIONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes fadeup {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}


/* ━━ BADGES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.badge {
  font-size: 9px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: .08em;
  color: #fff; flex-shrink: 0;
}
.empty {
  color: var(--t3); font-size: 14px; text-align: center;
  padding: 56px 24px; line-height: 2;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}

/* ━━ BUTTONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn {
  background: var(--s2);
  border: 1px solid var(--bdr2);
  border-radius: var(--radius-sm);
  color: var(--t1); cursor: pointer;
  padding: 8px 16px;
  font-size: 13px; font-weight: 500;
  font-family: inherit;
  transition: all var(--transition);
  display: inline-flex; align-items: center; gap: 7px;
  letter-spacing: -.01em; white-space: nowrap;
}
.btn:hover  { background: var(--s3); border-color: var(--bdr3); }
.btn.sm     { padding: 5px 12px; font-size: 12px; }
.btn.primary {
  background: var(--accent);
  border-color: transparent; color: #fff;
  box-shadow: 0 1px 4px rgba(59,130,246,.4);
}
.btn.primary:hover { background: var(--accent-lo); }
.btn.danger  { border-color: rgba(240,68,56,.3); color: var(--c-crit); }
.btn.danger:hover  { background: var(--c-crit-bg); border-color: rgba(240,68,56,.6); }
.btn.success { border-color: rgba(34,197,94,.3); color: var(--c-low); }
.btn.success:hover { background: var(--c-low-bg); }
.btn.ai {
  background: rgba(59,130,246,.06);
  border-color: rgba(59,130,246,.2);
  color: var(--accent-hi);
}
.btn.ai:hover { background: var(--accent-bg); border-color: var(--accent-bd); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ━━ FORM INPUTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.field-lbl {
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 6px;
}
.field-inp {
  width: 100%; background: var(--s2);
  border: 1px solid var(--bdr); border-radius: var(--radius-sm);
  padding: 10px 13px; color: var(--t1);
  font-size: 14px; font-family: inherit;
  outline: none; transition: border-color var(--transition);
}
.field-inp:focus { border-color: var(--accent-bd); }
.field-ta {
  width: 100%; background: var(--s2);
  border: 1px solid var(--bdr); border-radius: var(--radius-sm);
  padding: 10px 13px; color: var(--t1);
  font-size: 13px; font-family: inherit;
  outline: none; resize: vertical; line-height: 1.65;
  transition: border-color var(--transition);
}
.field-ta:focus { border-color: var(--accent-bd); }
.field-sel {
  width: 100%; background: var(--s2);
  border: 1px solid var(--bdr); border-radius: var(--radius-sm);
  padding: 10px 13px; color: var(--t1);
  font-size: 13px; font-family: inherit;
  outline: none; appearance: none; cursor: pointer;
}
.field-row   { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.field-group { display: flex; flex-direction: column; flex: 1; min-width: 90px; }

/* ━━ CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card {
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition);
}
.card:hover { border-color: var(--bdr2); }
.card-hdr {
  padding: 13px 18px;
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px;
}
.card-title {
  font-size: 13px; font-weight: 600; color: var(--t1);
  display: flex; align-items: center; gap: 7px;
}
.card-body { padding: 16px 18px; }

/* ━━ COMMAND CARDS — the core of the app ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cmdcard {
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-left: 3px solid transparent;
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
  transition: border-color var(--transition), box-shadow var(--transition);
  animation: fadeup .2s ease both;
}
.cmdcard:nth-child(2) { animation-delay: .05s; }
.cmdcard:nth-child(3) { animation-delay: .10s; }
.cmdcard:nth-child(4) { animation-delay: .15s; }
.cmdcard:hover {
  border-color: var(--bdr2);
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}

/* Card header — title + copy button */
.cmdhdr {
  padding: 14px 16px 12px;
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 12px;
}
.cmdtitle {
  font-size: 14px; font-weight: 700;
  color: var(--t1); margin-bottom: 3px;
  letter-spacing: -.02em; line-height: 1.3;
}
.cmdpurpose { font-size: 12px; color: var(--t2); line-height: 1.45; }

.copybtn {
  background: var(--s3);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  color: var(--t2); font-size: 11px; font-weight: 600;
  padding: 5px 12px; cursor: pointer;
  font-family: inherit; white-space: nowrap;
  transition: all var(--transition); flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  letter-spacing: .02em;
}
.copybtn:hover { border-color: var(--bdr2); color: var(--t1); background: var(--s4); }
.copybtn.ok {
  background: rgba(34,197,94,.08);
  border-color: rgba(34,197,94,.3);
  color: var(--c-low);
}

/* ── Code block — designed for readability at speed ── */
.cmdpre {
  padding: 14px 18px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: var(--code-bg);
  border-top: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
}
.cmdpre pre {
  margin: 0;
  font-size: 13px;
  color: var(--code-cmd);
  line-height: 2;
  white-space: pre-wrap; word-break: break-word;
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, monospace;
}
.cv { color: var(--code-var); font-style: normal; }   /* {VARIABLES} */
.cc { color: var(--code-cmt); }                        /* # comments  */

/* ── Example block ── */
.cmdex {
  padding: 11px 18px;
  background: rgba(74,222,128,.03);
  border-bottom: 1px solid var(--bdr);
}
.exlbl {
  font-size: 10px; color: var(--code-ex);
  font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
  margin-bottom: 5px;
  display: flex; align-items: center; gap: 6px;
}
.exlbl::before {
  content: ''; display: inline-block;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--code-ex);
}
.cmdex pre {
  margin: 0; font-size: 12.5px;
  color: rgba(74,222,128,.8);
  white-space: pre-wrap; word-break: break-word;
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, monospace;
  line-height: 1.8;
}

/* ── Flags & Details toggle ── */
.detog {
  width: 100%; background: none; border: none;
  padding: 9px 18px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; font-family: inherit;
  color: var(--t3); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  transition: all var(--transition);
}
.detog:hover { background: var(--s3); color: var(--t2); }

.deblk {
  padding: 14px 18px;
  border-top: 1px solid var(--bdr);
  display: flex; flex-direction: column; gap: 9px;
}
.flagrow { display: flex; gap: 11px; align-items: flex-start; }
.flagkey {
  font-size: 11px;
  color: var(--accent-hi);
  background: var(--accent-bg);
  border: 1px solid var(--accent-bd);
  padding: 2px 8px; border-radius: 4px;
  flex-shrink: 0;
  font-family: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
  white-space: nowrap;
}
.flagdesc { font-size: 12px; color: var(--t2); line-height: 1.5; padding-top: 2px; }

/* Note and output boxes */
.notebox {
  background: rgba(245,158,11,.05);
  border: 1px solid rgba(245,158,11,.18);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-size: 12px; color: #FDE68A;
  line-height: 1.6;
  display: flex; gap: 9px;
}
.notebox .ni {
  flex-shrink: 0; color: var(--c-med);
  font-weight: 700; font-size: 10px;
  text-transform: uppercase; letter-spacing: .06em;
  padding-top: 2px;
}
.outbox {
  background: rgba(34,197,94,.04);
  border: 1px solid rgba(34,197,94,.18);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-size: 12px; color: #86EFAC;
  line-height: 1.6;
  display: flex; gap: 9px;
}
.outbox .oi {
  flex-shrink: 0; color: var(--c-low);
  font-weight: 700; font-size: 10px;
  text-transform: uppercase; letter-spacing: .06em;
  padding-top: 2px;
}

/* ━━ CHECKLIST ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chkhdr {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 12px;
  flex-wrap: wrap; gap: 8px;
}
.chkcount {
  font-size: 11px; color: var(--t3);
  text-transform: uppercase; letter-spacing: .07em; font-weight: 700;
}
.togallbtn {
  background: none; border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  color: var(--t2); font-size: 11px;
  cursor: pointer; padding: 4px 12px;
  font-family: inherit;
  transition: all var(--transition);
}
.togallbtn:hover { border-color: var(--bdr2); color: var(--t1); }

.chklist {
  background: var(--s1); border: 1px solid var(--bdr);
  border-radius: var(--radius-lg); overflow: hidden;
}
.chkitem {
  padding: 13px 16px;
  border-bottom: 1px solid rgba(255,255,255,.03);
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
  transition: background var(--transition);
  -webkit-user-select: none; user-select: none;
  min-height: 48px;
}
.chkitem:last-child { border-bottom: none; }
.chkitem:hover { background: var(--s3); }
.chkbox {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid rgba(255,255,255,.14);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 11px; margin-top: 2px;
  transition: all .2s;
}
.chkbox.on { background: var(--c-low); border-color: var(--c-low); }
.chktxt { font-size: 13px; line-height: 1.6; color: var(--t1); }
.chkitem.done .chktxt { opacity: .38; text-decoration: line-through; text-decoration-color: var(--t3); }

/* ━━ INFO TAB ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tipcard {
  background: rgba(245,158,11,.05);
  border: 1px solid rgba(245,158,11,.14);
  border-radius: var(--radius-lg);
  padding: 16px; margin-bottom: 12px;
  display: flex; gap: 13px;
}
.tipicon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.tiplbl  { font-size: 10px; font-weight: 700; color: var(--c-med); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
.tiptxt  { font-size: 12px; color: #FDE68A; line-height: 1.65; }

.delivbox {
  background: var(--s2); border: 1px solid var(--bdr);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 12px;
}
.delivlbl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; font-weight: 600; }
.delivtxt { font-size: 13px; color: var(--t1); line-height: 1.5; }

.toolsbox {
  background: var(--s2); border: 1px solid var(--bdr);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 10px;
}
.toolslbl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; font-weight: 600; }
.toolswrap { display: flex; flex-wrap: wrap; gap: 6px; }
.toolchip {
  font-size: 11px; background: var(--s3); border: 1px solid var(--bdr);
  color: var(--accent-hi); padding: 3px 10px;
  border-radius: var(--radius-pill); font-weight: 500;
}

/* ━━ NOTES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.notelbl { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; font-weight: 600; }
.notetxt {
  width: 100%; background: var(--s1);
  border: 1px solid var(--bdr); border-radius: var(--radius-lg);
  padding: 16px; color: var(--t2);
  font-size: 14px; font-family: inherit;
  resize: vertical; outline: none; line-height: 1.75;
  min-height: 220px;
  transition: border-color var(--transition), color var(--transition);
}
.notetxt:focus { border-color: var(--accent-bd); color: var(--t1); }
.notefoot { font-size: 11px; color: var(--t3); margin-top: 6px; }

/* ━━ SEARCH RESULTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.srchhdr {
  font-size: 11px; color: var(--t3);
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 12px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.srchhdr::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
.srchres {
  background: var(--s1); border: 1px solid var(--bdr);
  border-radius: var(--radius-lg); overflow: hidden;
}
.srchitem {
  padding: 13px 16px;
  border-bottom: 1px solid rgba(255,255,255,.03);
  cursor: pointer; transition: background var(--transition);
}
.srchitem:last-child { border-bottom: none; }
.srchitem:hover { background: var(--s3); }
.srchctx  { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; font-weight: 700; }
.srchtitle{ font-size: 14px; font-weight: 600; color: var(--t1); margin-bottom: 3px; }
.srchcmd  { font-size: 12px; color: var(--code-cmd); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: .7; }
.srchmark { color: var(--c-med); background: rgba(245,158,11,.12); border-radius: 2px; padding: 0 2px; }

/* ━━ ACCESSIBILITY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
button:focus-visible, input:focus-visible, textarea:focus-visible,
select:focus-visible, a:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}


/* ━━ FINDINGS SECTION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sev-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.sev-btn {
  background: none; border: 1px solid var(--bdr);
  border-radius: var(--radius-pill);
  color: var(--t3); font-size: 11px; font-weight: 600;
  cursor: pointer; padding: 5px 14px;
  font-family: inherit; transition: all var(--transition);
}
.sev-btn.on { border-color: currentColor; }

.finding-row {
  background: var(--s1);
  border: 1px solid var(--bdr);
  border-left: 3px solid transparent;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 8px;
  animation: fadeup .15s ease both;
}
.finding-row:hover { border-color: var(--bdr2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.4); }
.finding-sev { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.finding-info { flex: 1; min-width: 0; }
.finding-title { font-size: 14px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.01em; }
.finding-meta  { font-size: 11px; color: var(--t2); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.finding-score { font-size: 20px; font-weight: 800; line-height: 1; flex-shrink: 0; text-align: right; letter-spacing: -.03em; }
.finding-status{ font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }

/* ━━ FINDING DETAIL PANEL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.detail-panel {
  position: fixed; top: 0; right: -100%;
  width: min(520px,100%); height: 100%;
  background: var(--s1);
  border-left: 1px solid var(--bdr);
  z-index: 200;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.detail-panel.open { right: 0; }
.detail-hdr {
  padding: 16px 18px;
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky; top: 0;
  background: var(--s1); z-index: 1;
}
.detail-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; flex: 1; }

/* CVSS Calculator */
.cvss-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
.cvss-metric { display: flex; flex-direction: column; gap: 4px; }
.cvss-lbl    { font-size: 9px; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
.cvss-sel {
  background: var(--s2); border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  color: var(--t1); font-size: 11px; font-family: inherit;
  padding: 5px 7px; outline: none; width: 100%; appearance: none; cursor: pointer;
}
.cvss-result {
  background: var(--s3); border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px;
}
.cvss-score-big { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -.03em; }
.cvss-vector { font-size: 9px; color: var(--t3); font-family: monospace; margin-top: 3px; word-break: break-all; }

/* MITRE Picker */
.mitre-search {
  width: 100%; background: var(--s2);
  border: 1px solid var(--bdr); border-radius: var(--radius-sm);
  padding: 8px 12px; color: var(--t1);
  font-size: 13px; font-family: inherit;
  outline: none; margin-bottom: 8px;
  transition: border-color var(--transition);
}
.mitre-search:focus { border-color: var(--accent-bd); }
.mitre-list {
  max-height: 170px; overflow-y: auto;
  background: var(--s2); border: 1px solid var(--bdr);
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column;
}
.mitre-item {
  padding: 8px 12px; cursor: pointer;
  transition: background var(--transition);
  display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid rgba(255,255,255,.03);
}
.mitre-item:last-child { border-bottom: none; }
.mitre-item:hover { background: var(--s3); }
.mitre-item.sel { background: var(--accent-bg); border-left: 2px solid var(--accent); }
.mitre-id     { font-size: 10px; color: var(--accent-hi); font-family: monospace; flex-shrink: 0; width: 54px; font-weight: 700; }
.mitre-name   { font-size: 12px; color: var(--t1); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mitre-tactic { font-size: 10px; color: var(--t3); flex-shrink: 0; }

/* AI overlay */
.ai-field    { position: relative; }
.ai-overlay  {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.75);
  border-radius: var(--radius-sm);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
  font-size: 12px; color: var(--accent-hi); gap: 8px;
}


.scope-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.scope-item{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-sm);
  padding:9px 13px;display:flex;align-items:center;gap:10px;
}
.scope-item-text{flex:1;min-width:0;word-break:break-all;font-family:monospace;font-size:12px;color:var(--t1)}
.scope-del{
  background:none;border:none;color:var(--t3);cursor:pointer;
  font-size:14px;flex-shrink:0;line-height:1;padding:0;
  transition:color var(--transition);
}
.scope-del:hover{color:var(--c-crit)}
.scope-add{display:flex;gap:7px;margin-top:8px}
.scope-add input{
  flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-sm);
  padding:8px 12px;color:var(--t1);font-size:12px;font-family:monospace;outline:none;
  transition:border-color var(--transition);
}
.scope-add input:focus{border-color:var(--accent-bd)}
.contact-card{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-sm);
  padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
}
.contact-info{flex:1}
.contact-name{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-.01em}
.contact-role{font-size:11px;color:var(--t2);margin-top:2px}
.contact-phone{font-size:12px;color:var(--c-low);margin-top:4px;font-family:monospace}
.sos-box{
  background:rgba(107,158,255,0.06);
  border:1px solid rgba(107,158,255,0.2);
  border-radius:var(--radius-sm);padding:13px 15px;
  font-size:12px;color:rgba(107,158,255,0.85);line-height:1.7;
}
.sos-title{font-size:10px;font-weight:700;color:var(--c-info);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}


.tool-tabs{display:flex;overflow-x:auto;gap:6px;padding:12px 22px;border-bottom:1px solid var(--bdr);flex-shrink:0;scrollbar-width:none}
.tool-tabs::-webkit-scrollbar{display:none}
.tool-tab{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-pill);
  color:var(--t2);font-size:12px;cursor:pointer;padding:6px 16px;
  white-space:nowrap;font-family:inherit;font-weight:500;
  transition:all var(--transition);
}
.tool-tab.on{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent-hi);font-weight:700}
.tool-card{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;
  transition:border-color var(--transition);
}
.tool-card:hover{border-color:var(--bdr2)}
.tool-hdr{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.tool-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;letter-spacing:-.02em}
.tool-desc{font-size:12px;color:var(--t2);line-height:1.45}
.tool-free{font-size:9px;padding:3px 9px;border-radius:var(--radius-sm);font-weight:700;flex-shrink:0}
.tool-free.yes{background:var(--c-low-bg);color:var(--c-low);border:1px solid rgba(34,198,90,.25)}
.tool-free.no{background:rgba(59,130,246,.08);color:var(--accent-hi);border:1px solid var(--accent-bd)}
.tool-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.03)}
.tool-row:last-child{border-bottom:none}
.tool-row-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;width:52px;flex-shrink:0;padding-top:2px;font-weight:600}
.tool-row-cmd{font-size:12px;color:#A8C8F8;font-family:monospace;flex:1;min-width:0;white-space:pre-wrap;word-break:break-word;line-height:1.55}
.tool-row-copy{
  background:none;border:1px solid var(--bdr);border-radius:var(--radius-sm);
  color:var(--t3);font-size:9px;padding:3px 8px;
  cursor:pointer;font-family:inherit;flex-shrink:0;
  transition:all var(--transition);
}
.tool-row-copy:hover{border-color:var(--bdr2);color:var(--t1)}
.tool-row-copy.ok{border-color:rgba(34,198,90,.3);color:var(--c-low)}
.paid-note{font-size:11px;color:var(--accent-hi);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--radius-sm);padding:7px 12px;margin:0 16px 10px}


.payload-cat{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px}
.payload-cat-hdr{padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background var(--transition)}
.payload-cat-hdr:hover{background:var(--s3)}
.payload-group{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.03)}
.payload-group:last-child{border-bottom:none}
.payload-grp-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:5px;letter-spacing:-.01em}
.payload-notes{font-size:11px;color:var(--t2);margin-bottom:10px;line-height:1.55;font-style:italic}
.payload-item{display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.payload-item:last-child{border-bottom:none}
.payload-val{font-size:12px;color:#A8C8F8;font-family:monospace;flex:1;min-width:0;word-break:break-all}
.payload-copy{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:2px;flex-shrink:0;transition:color var(--transition)}
.payload-copy:hover{color:var(--c-low)}


.report-preview{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-lg);
  padding:20px;font-size:13px;line-height:1.8;color:var(--t2);
  font-family:monospace;overflow-x:auto;white-space:pre-wrap;word-break:break-word;
  flex:1;min-height:320px;
}
.report-ctrls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.report-field{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2);font-weight:500}
.report-field input{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-sm);
  padding:5px 10px;color:var(--t1);font-size:12px;font-family:inherit;
  outline:none;width:140px;transition:border-color var(--transition);
}
.report-field input:focus{border-color:var(--accent-bd)}


.kc-stages{display:flex;gap:0;overflow-x:auto;padding:16px 20px;flex-shrink:0;border-bottom:1px solid var(--bdr);scrollbar-width:none}
.kc-stages::-webkit-scrollbar{display:none}
.kc-stage{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:12px;min-width:148px;flex-shrink:0;position:relative}
.kc-stage+.kc-stage{margin-left:8px}
.kc-stage-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:8px}
.kc-stage-items{display:flex;flex-direction:column;gap:5px;min-height:44px}
.kc-item{background:var(--s3);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:5px 9px;font-size:11px;color:var(--t1);display:flex;align-items:center;justify-content:space-between;gap:6px}
.kc-item-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:0;line-height:1;flex-shrink:0;transition:color var(--transition)}
.kc-item-del:hover{color:var(--c-crit)}
.kc-add{background:none;border:1px dashed var(--bdr);border-radius:var(--radius-sm);padding:5px;width:100%;font-size:11px;color:var(--t3);cursor:pointer;font-family:inherit;margin-top:5px;transition:all var(--transition);text-align:center}
.kc-add:hover{border-color:var(--bdr2);color:var(--t1)}
.kc-narrative{padding:16px 22px;flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.kc-nar-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.kc-nar-ta{width:100%;flex:1;min-height:130px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:14px;color:var(--t2);font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.7;transition:border-color var(--transition),color var(--transition)}
.kc-nar-ta:focus{border-color:var(--accent-bd);color:var(--t1)}


.timer-display{display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 22px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.timer-clock{font-size:52px;font-weight:800;letter-spacing:-.05em;color:var(--t1);font-family:monospace;line-height:1}
.timer-phase-label{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
.timer-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.timer-phase-pick{display:flex;gap:7px;overflow-x:auto;padding:12px 22px;border-bottom:1px solid var(--bdr);flex-shrink:0;scrollbar-width:none}
.timer-phase-pick::-webkit-scrollbar{display:none}
.tph-btn{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-pill);color:var(--t2);font-size:12px;cursor:pointer;padding:6px 14px;white-space:nowrap;font-family:inherit;font-weight:500;transition:all var(--transition);flex-shrink:0}
.tph-btn.on{font-weight:700}
.timer-log{flex:1;overflow-y:auto;padding:14px 22px;display:flex;flex-direction:column;gap:7px}
.timer-row{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:12px;transition:border-color var(--transition)}
.timer-row:hover{border-color:var(--bdr2)}
.timer-row-ph{font-size:13px;font-weight:600;color:var(--t1);flex:1;letter-spacing:-.01em}
.timer-row-dur{font-size:14px;font-weight:700;font-family:monospace}
.timer-row-date{font-size:11px;color:var(--t3)}
.timer-total{padding:12px 22px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.timer-total-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;font-weight:600}
.timer-total-val{font-size:18px;font-weight:800;font-family:monospace;color:var(--t1);letter-spacing:-.03em}


.profile-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.profile-item{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all var(--transition)}
.profile-item:hover{border-color:var(--bdr2)}
.profile-item.on{border-color:var(--accent-bd);background:var(--accent-bg)}
.profile-name{font-size:14px;font-weight:600;color:var(--t1);flex:1;letter-spacing:-.01em}
.profile-meta{font-size:11px;color:var(--t2);margin-top:2px}
.settings-section{margin-bottom:18px}
.settings-lbl{font-size:11px;font-weight:700;color:var(--t1);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.api-status{font-size:11px;color:var(--t3)}
.api-status.ok{color:var(--c-low)}
.api-status.err{color:var(--c-crit)}
.code-block{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:14px 16px;font-size:11px;font-family:monospace;color:#86EFAC;white-space:pre-wrap;overflow-x:auto;line-height:1.65}


/* ━━ DASHBOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

.dash-stat{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--radius-lg);padding:16px 18px;
  display:flex;flex-direction:column;gap:5px;
  position:relative;overflow:hidden;
  transition:border-color var(--transition);
}
.dash-stat:hover{border-color:var(--bdr2)}
.dash-stat-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:var(--radius-lg) 0 0 var(--radius-lg)}
.dash-stat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;font-weight:600}
.dash-stat-value{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.04em;transition:color .3s}
.dash-stat-sub{font-size:11px;color:var(--t3)}

.dash-progress-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px}
.dash-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dash-progress-title{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.01em}
.dash-progress-pct{font-size:14px;font-weight:800;letter-spacing:-.02em}

.dash-phase-bars{display:flex;flex-direction:column;gap:9px}
.dash-phase-bar-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:3px 0;border-radius:var(--radius-sm);transition:all var(--transition)}
.dash-phase-bar-row:hover{opacity:.8}
.dash-phase-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.dash-phase-name{font-size:11px;color:var(--t2);width:64px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.dash-phase-track{flex:1;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.dash-phase-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.dash-phase-pct{font-size:10px;color:var(--t3);width:30px;text-align:right;flex-shrink:0;font-weight:600;font-family:monospace}

.dash-resume-card{
  background:var(--s1);border:1px solid var(--bdr);border-radius:var(--radius-lg);
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all var(--transition);margin-bottom:12px;
}
.dash-resume-card:hover{border-color:var(--accent-bd);background:var(--accent-bg);transform:translateY(-1px)}
.dash-resume-info{flex:1;min-width:0}
.dash-resume-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px;font-weight:600}
.dash-resume-step{font-size:15px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}
.dash-resume-phase{font-size:12px;color:var(--t2);margin-top:2px;font-weight:500}
.dash-resume-arrow{font-size:18px;color:var(--t3);flex-shrink:0}

.dash-findings-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:12px}
.dash-sev-chip{
  background:var(--s1);border:1px solid var(--bdr);border-radius:var(--radius-lg);
  padding:12px 8px;text-align:center;
  border-top:3px solid transparent;
  transition:all var(--transition);cursor:pointer;
}
.dash-sev-chip:hover{transform:translateY(-2px);border-color:inherit}
.dash-sev-num{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.04em}
.dash-sev-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;font-weight:600}

.dash-eng-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.dash-eng-name{font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-.04em}
.dash-eng-meta{font-size:12px;color:var(--t2);margin-top:4px;font-weight:500}

.dash-quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dash-action-btn{
  background:var(--s2);border:1px solid var(--bdr);border-radius:var(--radius-sm);
  padding:8px 16px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:7px;
  transition:all var(--transition);letter-spacing:-.01em;
}
.dash-action-btn:hover{border-color:var(--bdr2);color:var(--t1)}

.dash-timer-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--c-low-bg);border:1px solid rgba(34,198,90,.25);
  border-radius:var(--radius-sm);padding:4px 10px;
  font-size:12px;color:var(--c-low);font-family:monospace;font-weight:600;
}
.dash-timer-badge.active{
  background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent-hi);
  animation:pulse 2.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}

@media(min-width:640px){.dash-grid{grid-template-columns:repeat(4,1fr)}}


/* ━━ RTL OVERRIDES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
body.rtl{direction:rtl}
body.rtl #drawer{left:auto;right:0;border-right:none;border-left:1px solid var(--bdr);transform:translateX(105%)}
body.rtl #drawer.on{transform:translateX(0)}
body.rtl .detail-panel{right:auto;left:-100%;border-left:none;border-right:1px solid var(--bdr);transition:left .3s cubic-bezier(.4,0,.2,1)}
body.rtl .detail-panel.open{left:0}
body.rtl .sdots{flex-direction:row-reverse}
body.rtl .chkitem{border-right:none;border-left:1px solid rgba(255,255,255,.03)}
body.rtl .chkitem:nth-child(2n){border-left:none}
body.rtl .tool-row-cmd,body.rtl .payload-val,body.rtl .cvss-vector,
body.rtl .code-block,body.rtl .cmdpre pre,body.rtl .report-preview,
body.rtl .scope-item-text{direction:ltr;text-align:left;unicode-bidi:plaintext}
body.rtl .timer-clock,body.rtl input[type="date"]{direction:ltr}
body.rtl #searchinp,body.rtl .field-inp,body.rtl .field-ta,body.rtl textarea,body.rtl .mitre-search{text-align:right}
body.rtl .badge,body.rtl .tool-free,body.rtl .flagkey{direction:ltr}


/* ━━ SCROLLBARS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }

/* ━━ NAVIGATION VISIBILITY RULES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Mobile (<640px): secnav HIDDEN → bottom tab bar is primary navigation
   Tablet (640px+): secnav VISIBLE → bottom tab bar hidden
   Desktop (1024px+): sidebar for phases, top secnav for sections         */
#secnav   { display: none; }      /* hidden on mobile by default */
#bottomnav{ display: flex; }      /* always visible on mobile */

@media (min-width: 640px) {
  #secnav   { display: flex !important; }
  #bottomnav{ display: none !important; }
  #drawer   { width: 300px; }
  .sec-body { padding: 20px 24px; }
}

@media (min-width: 1024px) {
  #hambtn        { display: none !important; }
  #phasenav      { display: none !important; }
  #bottomnav     { display: none !important; }
  #mask          { display: none !important; }
  #drawer {
    position: relative !important; transform: none !important;
    width: 268px !important; transition: none !important;
    flex-shrink: 0; height: 100%;
    display: flex; flex-direction: column;
  }
  .sidebar-phases{ display: flex !important; }
  #content       { padding: 22px 26px; }
  .cmdcard:hover { box-shadow: 0 6px 28px rgba(0,0,0,.6); }
  .chklist       { display: grid; grid-template-columns: 1fr 1fr; }
  .chkitem       { border-right: 1px solid rgba(255,255,255,.03); }
  .chkitem:nth-child(2n) { border-right: none; }
  .deblk         { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .notebox, .outbox { grid-column: 1/-1; }
  .detail-panel  { width: 540px; }
}

@media (min-width: 1280px) {
  #drawer  { width: 284px !important; }
  #content { padding: 24px 30px; }
}

/* ━━ IPHONE PRO MAX TUNING (390px+, portrait) ━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (min-width: 390px) and (max-width: 639px) {
  /* Phase pills */
  .ptab { padding: 7px 15px; }
  .ptab .pico { font-size: 15px; }
  .ptab .plbl { font-size: 12px; }
  /* Bottom tabs */
  .bni { min-height: 58px; padding: 10px 4px 8px; }
  .bni-icon { font-size: 24px; }
  .bni-lbl  { font-size: 11px; }
  /* Step header */
  .sphtitle { font-size: 20px; }
  /* Topbar: hide decorative dots to save space */
  .dots { display: none; }
  /* Command code — slightly larger on Pro Max */
  .cmdpre pre { font-size: 13.5px; }
}

/* ━━ MOBILE FINDING PANEL — slides up as bottom sheet ━━━━━━━━━━━━━━━━ */
@media (max-width: 639px) {
  .detail-panel {
    width: 100% !important;
    left: auto !important; right: 0 !important;
    border-left: none;
    border-top: 1px solid var(--bdr);
    top: auto; bottom: -100%; height: 92vh;
    border-radius: 20px 20px 0 0;
    transition: bottom .32s cubic-bezier(.32,0,.67,0);
  }
  .detail-panel.open { bottom: 0 !important; right: 0 !important; }
  .cvss-grid { grid-template-columns: repeat(2,1fr); }
  .sec-hdr  { padding: 14px 16px; }
  .sec-body { padding: 14px 16px; gap: 12px; }
  .card-body{ padding: 14px; }
  #content  { padding: 16px; }
}

/* ━━ RTL (Arabic) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
body.rtl { direction: rtl; }
body.rtl #drawer {
  left: auto; right: 0;
  border-right: none; border-left: 1px solid var(--bdr);
  transform: translateX(105%);
}
body.rtl #drawer.on { transform: translateX(0); }
body.rtl .detail-panel {
  right: auto; left: -100%;
  border-left: none; border-right: 1px solid var(--bdr);
  transition: left .3s cubic-bezier(.4,0,.2,1);
}
body.rtl .detail-panel.open { left: 0; right: auto; }
body.rtl .sdots { flex-direction: row-reverse; }
body.rtl .chkitem { border-right: none; border-left: 1px solid rgba(255,255,255,.03); }
body.rtl .chkitem:nth-child(2n) { border-left: none; }
body.rtl .cmdpre pre,
body.rtl .cmdex pre,
body.rtl .tool-row-cmd,
body.rtl .payload-val,
body.rtl .cvss-vector,
body.rtl .code-block,
body.rtl .report-preview { direction: ltr; text-align: left; unicode-bidi: plaintext; }
body.rtl .badge, body.rtl .flagkey { direction: ltr; }
body.rtl input[type="date"] { direction: ltr; }
body.rtl #searchinp, body.rtl .field-inp, body.rtl .field-ta,
body.rtl textarea, body.rtl .mitre-search { text-align: right; }

/* ━━ REDUCED MOTION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

</style>

window.onerror=function(m,s,l){var e=document.getElementById('err');if(e){e.style.display='block';e.textContent='JS Error: '+m+' (line '+l+')';}return false;};

var APP={
  section:'framework',profile:'default',lang:'en',
  phase:'pre',step:'p1',tab:'cmd',exp:{},q:'',drawer:false,
  ck:{},notes:{},eng:'New Engagement',
  findings:[],editFinding:null,fFilter:'all',fStatus:'all',
  scope:{targets:[],oot:[],windows:[],contacts:[],type:'Black Box',start:'',end:'',client:''},
  kc:[],kcNarr:'',
  timerSessions:[],timerActive:null,timerInterval:null,timerSelPhase:'recon',
  toolsCat:0,toolsSearch:'',
  apiKey:'',apiEndpoint:'/api/chat',
  reportTester:'',reportDate:'',reportLang:'',
  profiles:[]
};

function pkey(k){return 'apt_'+APP.profile+'_'+k;}
// psave is fire-and-forget (callers never await it) so every existing call
// site throughout the app keeps working unchanged. The encrypt+write (if
// encryption is enabled) happens in the background — see 00b-crypto.js.
function psave(k,v){secureSet(pkey(k),v);}
// pload is async because decryption is async. It has exactly one call site
// (loadProfile, below) plus a couple of direct localStorage reads elsewhere
// that route through secureGet directly — see 12-profiles.js/13-settings.js.
function pload(k,d){return secureGet(pkey(k),d);}

function initData(){
  try{
    var raw=atob(B64DATA);
    D=JSON.parse(raw);
    PHASES=D.phases||[];
    TOOLS=D.tools||[];
    PAYLOADS=D.payloads||[];
    MITRE=D.mitre||[];
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='Data error: '+e;
  }
}

function loadProfile(){
  APP.lang=localStorage.getItem('apt_lang')||'en';
  return Promise.all([
    pload('ck',{}), pload('notes',{}), pload('eng','New Engagement'),
    pload('phase','pre'), pload('step','p1'), pload('findings',[]),
    pload('scope',{targets:[],oot:[],windows:[],contacts:[],type:'Black Box',start:'',end:'',client:''}),
    pload('timer_sessions',[]), pload('kc',[]), pload('kc_narr',''),
    secureGet('api_key',''), secureGet('api_endpoint','/api/chat'), secureGet('apt_profiles',[])
  ]).then(function(r){
    APP.ck=r[0]; APP.notes=r[1]; APP.eng=r[2]; APP.phase=r[3]||'pre'; APP.step=r[4]||'p1';
    APP.findings=r[5]; APP.scope=r[6]; APP.timerSessions=r[7]; APP.kc=r[8]; APP.kcNarr=r[9];
    APP.apiKey=r[10]; APP.apiEndpoint=r[11]; APP.profiles=r[12];
    if(!APP.profiles.length){
      APP.profiles=[{id:'default',name:'Default Engagement',created:Date.now()}];
      secureSet('apt_profiles',APP.profiles);
    }
  });
}

function getPhase(id){for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===id)return PHASES[i];}return PHASES[0];}
function getStep(ph,sid){for(var i=0;i<ph.steps.length;i++){if(ph.steps[i].id===sid)return ph.steps[i];}return ph.steps[0];}
function phaseIdx(){for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===APP.phase)return i;}return 0;}
function stepIdx(ph){for(var i=0;i<ph.steps.length;i++){if(ph.steps[i].id===APP.step)return i;}return 0;}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copy(txt,btn){
  navigator.clipboard.writeText(txt).then(function(){
    if(!btn)return;
    var orig=btn.textContent;
    btn.textContent='Copied!';
    btn.classList.add('ok');
    setTimeout(function(){btn.textContent=orig;btn.classList.remove('ok');},1200);
  });
}
var COPYDATA={};
var _copyCtr=0;
function regCopy(s){
  var id='cp'+(_copyCtr++);
  COPYDATA[id]=s;
  return id;
}

/* ── Encryption layer ─────────────────────────────────────────────────────
   Master-password-derived AES-256-GCM encryption for everything written to
   localStorage. Key lives in memory only (CRYPTO_KEY) for the session —
   never persisted, never sent anywhere. PBKDF2-SHA256 with 250k iterations
   derives the key from the password + a per-install random salt.

   Storage format for an encrypted value: "ENC1:<iv-b64>:<ciphertext-b64>"
   Legacy plaintext values (from before encryption was enabled, or while
   it's off) are detected by the absence of the ENC1: prefix and read
   through unchanged — and transparently re-saved as encrypted on next
   write, so turning encryption on later never loses existing data. */

var CRYPTO_KEY = null;        // in-memory CryptoKey, session-only
var CRYPTO_ENABLED = false;   // true once a password has been set up
var PBKDF2_ITERATIONS = 250000;
var VERIFY_PLAINTEXT = 'PENTESTPRO_VERIFY_OK';

function b64FromBytes(bytes) {
  var bin = '';
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function bytesFromB64(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function genSaltB64() {
  return b64FromBytes(crypto.getRandomValues(new Uint8Array(16)));
}

function deriveKey(password, saltB64) {
  var enc = new TextEncoder();
  var salt = bytesFromB64(saltB64);
  return crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey'])
    .then(function (baseKey) {
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    });
}

function encryptString(key, plaintext) {
  var enc = new TextEncoder();
  var iv = crypto.getRandomValues(new Uint8Array(12));
  return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(plaintext))
    .then(function (ciphertext) {
      return 'ENC1:' + b64FromBytes(iv) + ':' + b64FromBytes(new Uint8Array(ciphertext));
    });
}

function decryptString(key, blob) {
  var parts = blob.split(':');
  if (parts.length !== 3 || parts[0] !== 'ENC1') return Promise.reject(new Error('bad blob format'));
  var iv = bytesFromB64(parts[1]);
  var ciphertext = bytesFromB64(parts[2]);
  var dec = new TextDecoder();
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext)
    .then(function (buf) { return dec.decode(buf); });
}

function isEncryptedBlob(s) {
  return typeof s === 'string' && s.indexOf('ENC1:') === 0;
}

/* secureSet/secureGet operate on raw (already-prefixed) localStorage keys.
   secureSet is fire-and-forget: callers don't await it, matching the
   existing synchronous psave() call pattern used in 20+ places. The actual
   encrypt+write happens in the background — AES-GCM on a small JSON blob
   completes in low single-digit milliseconds, well within one frame. */
function secureSet(rawKey, value) {
  var json = JSON.stringify(value);
  if (CRYPTO_ENABLED && CRYPTO_KEY) {
    encryptString(CRYPTO_KEY, json).then(function (enc) {
      try { localStorage.setItem(rawKey, enc); } catch (e) {}
    });
  } else {
    try { localStorage.setItem(rawKey, json); } catch (e) {}
  }
}

function secureGet(rawKey, def) {
  var raw;
  try { raw = localStorage.getItem(rawKey); } catch (e) { return Promise.resolve(def); }
  if (raw === null) return Promise.resolve(def);
  if (isEncryptedBlob(raw)) {
    if (!CRYPTO_KEY) return Promise.resolve(def);
    return decryptString(CRYPTO_KEY, raw).then(function (json) {
      try { return JSON.parse(json); } catch (e) { return def; }
    }).catch(function () { return def; });
  }
  // legacy plaintext value — read it as-is, and migrate to encrypted form
  // on the next write so enabling encryption later never loses data.
  var val;
  try { val = JSON.parse(raw); } catch (e) { return Promise.resolve(def); }
  if (CRYPTO_ENABLED && CRYPTO_KEY) secureSet(rawKey, val);
  return Promise.resolve(val);
}


/* ── Lock screen ──────────────────────────────────────────────────────────
   Gates app startup. Three states:
   - first run, no password ever set  -> setup-or-skip screen
   - password set, locked this load   -> unlock screen
   - unlocked / skipped                -> resolves and the normal init in
                                          99-main.js continues

   resolveLockScreen() returns a Promise that resolves once the app is
   allowed to proceed (CRYPTO_KEY + CRYPTO_ENABLED are set correctly by then,
   or CRYPTO_ENABLED stays false if the user skipped). */

function lockEl(){return document.getElementById('lockscreen');}

function resolveLockScreen(){
  return new Promise(function(resolve){
    var hasCheck = localStorage.getItem('apt_crypto_check') !== null;
    var dismissed = localStorage.getItem('apt_crypto_dismissed') === '1';
    if (hasCheck) {
      renderUnlockScreen(resolve);
    } else if (dismissed) {
      resolve();
    } else {
      renderFirstRunScreen(resolve);
    }
  });
}

function lockScreenShell(inner){
  return '<div class="lock-card">'
    + '<div class="lock-brand">🛡 ' + esc(t('lock_app_name')) + '</div>'
    + inner
    + '</div>';
}

function renderFirstRunScreen(resolve){
  var el = lockEl();
  el.style.display = 'flex';
  el.innerHTML = lockScreenShell(
    '<div class="lock-title">' + t('lock_setup_title') + '</div>'
    + '<div class="lock-body">' + t('lock_setup_body') + '</div>'
    + '<input type="password" class="lock-input" id="lp_pw1" placeholder="' + esc(t('lock_password_ph')) + '" autocomplete="new-password">'
    + '<input type="password" class="lock-input" id="lp_pw2" placeholder="' + esc(t('lock_password_confirm_ph')) + '" autocomplete="new-password">'
    + '<div class="lock-error" id="lp_err"></div>'
    + '<button class="btn primary lock-btn" id="lp_setup_btn">' + t('lock_set_password_btn') + '</button>'
    + '<button class="btn lock-btn-secondary" id="lp_skip_btn">' + t('lock_skip_btn') + '</button>'
    + '<div class="lock-note">' + t('lock_skip_note') + '</div>'
  );
  document.getElementById('lp_setup_btn').onclick = function(){ handleSetupSubmit(resolve); };
  document.getElementById('lp_skip_btn').onclick = function(){
    localStorage.setItem('apt_crypto_dismissed','1');
    el.style.display='none';
    resolve();
  };
  document.getElementById('lp_pw2').addEventListener('keydown', function(e){
    if(e.key==='Enter') handleSetupSubmit(resolve);
  });
}

function handleSetupSubmit(resolve){
  var pw1 = document.getElementById('lp_pw1').value;
  var pw2 = document.getElementById('lp_pw2').value;
  var errEl = document.getElementById('lp_err');
  errEl.textContent = '';
  if (pw1.length < 8) { errEl.textContent = t('lock_too_short_error'); return; }
  if (pw1 !== pw2) { errEl.textContent = t('lock_mismatch_error'); return; }

  var btn = document.getElementById('lp_setup_btn');
  btn.disabled = true;
  var salt = genSaltB64();
  deriveKey(pw1, salt).then(function(key){
    return encryptString(key, VERIFY_PLAINTEXT).then(function(check){
      localStorage.setItem('apt_crypto_salt', salt);
      localStorage.setItem('apt_crypto_check', check);
      localStorage.removeItem('apt_crypto_dismissed');
      CRYPTO_KEY = key;
      CRYPTO_ENABLED = true;
      lockEl().style.display = 'none';
      resolve();
    });
  }).catch(function(){
    btn.disabled = false;
    errEl.textContent = t('lock_wrong_password');
  });
}

function renderUnlockScreen(resolve){
  var el = lockEl();
  el.style.display = 'flex';
  el.innerHTML = lockScreenShell(
    '<div class="lock-title">' + t('lock_unlock_title') + '</div>'
    + '<div class="lock-body">' + t('lock_unlock_body') + '</div>'
    + '<input type="password" class="lock-input" id="lp_unlock_pw" placeholder="' + esc(t('lock_password_ph')) + '" autocomplete="current-password">'
    + '<div class="lock-error" id="lp_err"></div>'
    + '<button class="btn primary lock-btn" id="lp_unlock_btn">' + t('lock_unlock_btn') + '</button>'
    + '<button class="lock-forgot" id="lp_forgot_btn">' + t('lock_forgot_link') + '</button>'
  );
  document.getElementById('lp_unlock_btn').onclick = function(){ handleUnlockSubmit(resolve); };
  document.getElementById('lp_unlock_pw').addEventListener('keydown', function(e){
    if(e.key==='Enter') handleUnlockSubmit(resolve);
  });
  document.getElementById('lp_unlock_pw').focus();
  document.getElementById('lp_forgot_btn').onclick = function(){ renderResetConfirm(resolve); };
}

function handleUnlockSubmit(resolve){
  var pw = document.getElementById('lp_unlock_pw').value;
  var errEl = document.getElementById('lp_err');
  var btn = document.getElementById('lp_unlock_btn');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = t('lock_unlocking');
  var salt = localStorage.getItem('apt_crypto_salt');
  var check = localStorage.getItem('apt_crypto_check');
  deriveKey(pw, salt).then(function(key){
    return decryptString(key, check).then(function(plain){
      if (plain !== VERIFY_PLAINTEXT) throw new Error('mismatch');
      CRYPTO_KEY = key;
      CRYPTO_ENABLED = true;
      lockEl().style.display = 'none';
      resolve();
    });
  }).catch(function(){
    btn.disabled = false;
    btn.textContent = t('lock_unlock_btn');
    errEl.textContent = t('lock_wrong_password');
  });
}

function renderResetConfirm(resolve){
  var el = lockEl();
  el.innerHTML = lockScreenShell(
    '<div class="lock-title">' + t('lock_forgot_link') + '</div>'
    + '<div class="lock-body lock-danger">' + t('lock_reset_confirm1') + '</div>'
    + '<input type="text" class="lock-input" id="lp_reset_confirm" placeholder="' + esc(t('lock_reset_type_confirm')) + '" autocomplete="off">'
    + '<div class="lock-error" id="lp_err"></div>'
    + '<button class="btn danger lock-btn" id="lp_reset_btn">' + t('security_reset_btn') + '</button>'
    + '<button class="btn lock-btn-secondary" id="lp_cancel_reset_btn">' + t('cancel_btn') + '</button>'
  );
  document.getElementById('lp_cancel_reset_btn').onclick = function(){ renderUnlockScreen(resolve); };
  document.getElementById('lp_reset_btn').onclick = function(){
    var typed = document.getElementById('lp_reset_confirm').value;
    if (typed !== 'RESET') {
      document.getElementById('lp_err').textContent = t('lock_mismatch_error');
      return;
    }
    document.getElementById('lp_reset_btn').textContent = t('lock_resetting');
    wipeAllEncryptedData();
    CRYPTO_KEY = null;
    CRYPTO_ENABLED = false;
    lockEl().style.display = 'none';
    resolve();
  };
}

// Removes every key this app has ever written to localStorage, across all
// profiles, plus the crypto setup itself. Used by the reset/forgot-password
// flow. Does NOT touch unrelated localStorage keys from other sites/apps
// (impossible anyway — localStorage is already origin-scoped) but is careful
// to only remove keys matching this app's own prefixes.
function wipeAllEncryptedData(){
  var toRemove = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && (k.indexOf('apt_') === 0 || k === 'api_key' || k === 'api_endpoint')) {
      toRemove.push(k);
    }
  }
  toRemove.forEach(function(k){ localStorage.removeItem(k); });
}


var CVSS_AV={N:0.85,A:0.62,L:0.55,P:0.2};
var CVSS_AC={L:0.77,H:0.44};
var CVSS_PR={N:{U:0.85,C:0.85},L:{U:0.62,C:0.50},H:{U:0.27,C:0.50}};
var CVSS_UI={N:0.85,R:0.62};
var CVSS_CIA={N:0,L:0.22,H:0.56};

function calcCVSS(m){
  var av=CVSS_AV[m.AV]||0.85,ac=CVSS_AC[m.AC]||0.77;
  var pr=((CVSS_PR[m.PR]||{})[m.S])||0.85;
  var ui=CVSS_UI[m.UI]||0.85;
  var C=CVSS_CIA[m.C]||0,I=CVSS_CIA[m.I]||0,A=CVSS_CIA[m.A]||0;
  var ISC=1-(1-C)*(1-I)*(1-A);
  var Imp=m.S==='U'?6.42*ISC:7.52*(ISC-0.029)-3.25*Math.pow(ISC-0.02,15);
  var Exp=8.22*av*ac*pr*ui;
  if(Imp<=0)return '0.0';
  var raw=m.S==='U'?Math.min(Imp+Exp,10):Math.min(1.08*(Imp+Exp),10);
  return (Math.ceil(raw*10)/10).toFixed(1);
}

function cvssToSev(s){var n=parseFloat(s);if(n===0)return 'Info';if(n<=3.9)return 'Low';if(n<=6.9)return 'Medium';if(n<=8.9)return 'High';return 'Critical';}

function toggleDrawer(){APP.drawer=!APP.drawer;rDrawer();}
function closeDrawer(){APP.drawer=false;rDrawer();}
function openDrawer(){APP.drawer=true;rDrawer();}

function rDrawer(){
  var ph=getPhase(APP.phase);
  var mask=document.getElementById('mask');
  var drawer=document.getElementById('drawer');
  var hambtn=document.getElementById('hambtn');
  if(mask)mask.classList.toggle('on',APP.drawer);
  if(drawer)drawer.classList.toggle('on',APP.drawer);
  if(hambtn)hambtn.classList.toggle('on',APP.drawer);

  var steps=ph.steps||[];
  var h='<div class="drwhdr">';
  h+='<div class="drwphase" style="color:'+ph.color+'">'+ph.icon+' '+esc(tx(ph.label))+'</div>';
  h+='<div class="drwdesc">'+esc(tx(ph.desc))+'</div></div>';
  var doneCount=0,total=0;
  steps.forEach(function(st){
    total+=st.checklist?st.checklist.length:0;
    (st.checklist||[]).forEach(function(c,i){if(APP.ck[st.id+'_'+i])doneCount++;});
  });
  h+='<div class="pbar" style="margin:0 10px 6px;height:2px"><div class="pfill" style="width:'+(total?Math.round(doneCount/total*100):0)+'%;background:'+ph.color+'"></div></div>';
  steps.forEach(function(st){
    var done=0,total2=st.checklist?st.checklist.length:0;
    (st.checklist||[]).forEach(function(c,i){if(APP.ck[st.id+'_'+i])done++;});
    var pct=total2?Math.round(done/total2*100):0;
    var isOn=APP.step===st.id;
    var pri=st.priority||'medium';
    var priC=pri==='critical'?'#dc2626':pri==='high'?'#ea580c':'#475569';
    h+='<button class="drwbtn'+(isOn?' on':'')+'" onclick="selectStep(\''+st.id+'\')" style="'+(isOn?'border-left-color:'+ph.color+';':'')+'">'+
      '<div class="drwtitle"><span>'+esc(tx(st.title))+'</span>'+
      '<span class="badge" style="background:'+priC+';font-size:7px">'+t('pri_'+pri).toUpperCase()+'</span></div>'+
      '<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+ph.color+'"></div></div>'+
      '</button>';
  });

  var sph='';
  PHASES.forEach(function(p){
    var totPh=0,donePh=0;
    (p.steps||[]).forEach(function(st){
      (st.checklist||[]).forEach(function(c,i){totPh++;if(APP.ck[st.id+'_'+i])donePh++;});
    });
    var pct=totPh?Math.round(donePh/totPh*100):0;
    sph+='<button class="sph-btn'+(p.id===APP.phase?' on':'')+'" onclick="selectPhase(\''+p.id+'\')">'+
      '<span class="sph-ico">'+p.icon+'</span>'+
      '<div class="sph-info"><div class="sph-lbl" style="color:'+(p.id===APP.phase?p.color:'var(--t1)')+'">'+esc(tx(p.label))+'</div>'+
      '<div class="sph-pct">'+pct+'% '+t('complete_lbl').toLowerCase()+'</div></div>'+
      ringHTML(pct,p.color,26,pct+'%')+'</button>';
  });

  if(drawer)drawer.innerHTML='<div class="sidebar-phases">'+sph+'</div>'+h;
}

function selectPhase(id){
  APP.phase=id;
  APP.drawer=false;
  var ph=getPhase(id);
  APP.step=(ph.steps&&ph.steps[0])?ph.steps[0].id:'';
  APP.tab='cmd';
  APP.q='';
  psave('phase',APP.phase);psave('step',APP.step);
  renderAll();
}

function selectStep(id){
  APP.step=id;
  APP.tab='cmd';
  APP.drawer=false;
  APP.q='';
  psave('step',APP.step);
  renderAll();
}

function rPhaseNav(){
  var h='';
  PHASES.forEach(function(p){
    var totPh=0,donePh=0;
    (p.steps||[]).forEach(function(st){
      (st.checklist||[]).forEach(function(c,i){totPh++;if(APP.ck[st.id+'_'+i])donePh++;});
    });
    var pct=totPh?Math.round(donePh/totPh*100):0;
    var on=p.id===APP.phase;
    var col=on?p.color:'';
    h+='<button class="ptab'+(on?' on':'')+'" onclick="selectPhase(\''+p.id+'\')" '
      +'style="'+(on?'background:'+col+';box-shadow:0 2px 8px '+col+'44;':'')+'">'
      +'<span class="pico">'+p.icon+'</span>'
      +'<span class="plbl">'+esc(tx(p.short))+'</span>'
      +(pct===100?'<span class="ptab-done"></span>':'')
      +'</button>';
  });
  var el=document.getElementById('phasenav');
  if(el){
    el.innerHTML=h;

    setTimeout(function(){
      var activeBtn=el.querySelector('.ptab.on');

    +'<div class="sphtitle">'+esc(tx(st.title))+'</div>'
    +'<div class="sphsumm">'+esc(tx(st.summary))+'</div>'

    +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">'
    +'<span class="badge" style="background:'+priColors[pri]+'">'+t('pri_'+pri).toUpperCase()+'</span>'

function rTabBar(){
  var ph=getPhase(APP.phase);

    document.getElementById('tabbar').innerHTML='<button class="tbtn on">'+t('tab_search_results')+'</button>';

   +'<button class="tbtn'+(APP.tab==='chk'?' on':'')+'" onclick="setTab(\'chk\')">'+t('tab_checklist')+' ('+(st.checklist||[]).length+')</button>'
