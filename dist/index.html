<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PenTest Pro">
<meta name="theme-color" content="#09090f">
<title>PenTest Pro — Elite Framework</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--bg:#09090f;--s1:#0e0e1a;--s2:#131320;--s3:#181828;--bdr:#1c1c2e;--bdr2:#252538;--t1:#e8e8f4;--t2:#6868a0;--t3:#3e3e58;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}
.mono{font-family:'SF Mono','Fira Code','JetBrains Mono',Menlo,monospace}
#root{height:100dvh;height:-webkit-fill-available;display:flex;flex-direction:column;overflow:hidden;padding-left:var(--sal)}


/* TOPBAR */
#topbar{background:var(--s1);border-bottom:1px solid var(--bdr);padding:0 12px;padding-top:var(--sat);display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:calc(50px + var(--sat));position:relative;z-index:20}
#hambtn{background:none;border:1px solid var(--bdr);border-radius:7px;color:var(--t2);width:32px;height:32px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#hambtn.on{background:#1e1e3a;border-color:#303055;color:var(--t1)}
.dots{display:flex;gap:4px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%}
#engbtn{background:none;border:none;color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0;display:flex;align-items:center;gap:4px;transition:color .15s;max-width:120px;flex-shrink:0}
#engbtn:hover{color:var(--t1)}
#searchbox{flex:1;display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:0 9px;height:32px;min-width:0;transition:border-color .2s}
#searchbox:focus-within{border-color:var(--bdr2)}
#searchinp{background:none;border:none;outline:none;color:var(--t1);font-size:12px;font-family:inherit;width:100%;min-width:0}
#searchinp::placeholder{color:var(--t3)}
.srchico{color:var(--t3);font-size:12px;flex-shrink:0}
#clrbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;flex-shrink:0;display:none;padding:0;line-height:1}
#totalring{flex-shrink:0}
#resetbtn{background:none;border:1px solid #2a1010;border-radius:6px;color:#f87171;cursor:pointer;padding:4px 7px;font-size:10px;flex-shrink:0;transition:all .15s;white-space:nowrap}
#resetbtn:hover{background:#2a1010}

/* SECTION NAV */
#secnav{background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#secnav::-webkit-scrollbar{display:none}
.secbtn{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 10px;min-width:54px;font-size:9px;color:var(--t2);transition:all .15s;flex-shrink:0;white-space:nowrap}
.secbtn .sico{font-size:14px}
.secbtn.on{color:var(--t1);font-weight:600;border-bottom-color:#4f6ef7}
.secbtn:hover{color:var(--t1)}

/* PHASE NAV (framework only) */
#phasenav{background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#phasenav::-webkit-scrollbar{display:none}
.ptab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 9px 3px;min-width:58px;transition:border-color .2s;flex-shrink:0}
.ptab .pico{font-size:13px}
.ptab .plbl{font-size:9px;letter-spacing:.04em;color:var(--t2)}
.ptab.on .plbl{font-weight:700}

/* WRAP + DRAWER */
#wrap{flex:1;display:flex;overflow:hidden;position:relative}
#mask{position:absolute;inset:0;background:rgba(0,0,0,.65);z-index:99;display:none;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
#mask.on{display:block}
#drawer{position:absolute;top:0;left:0;height:100%;width:270px;background:var(--s1);border-right:1px solid var(--bdr);overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:100;transform:translateX(-105%);transition:transform .28s cubic-bezier(.4,0,.2,1);flex-shrink:0}
#drawer.on{transform:translateX(0)}
.sidebar-phases{display:none;flex-direction:column;padding:6px;gap:1px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sph-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;border-radius:7px;padding:7px 10px;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s}
.sph-btn:hover{background:var(--s3)}
.sph-btn.on{background:var(--s2)}
.sph-ico{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.sph-info{flex:1;min-width:0}
.sph-lbl{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sph-pct{font-size:10px;color:var(--t3);margin-top:1px}
.drwhdr{padding:11px 13px 9px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--s1);z-index:1;flex-shrink:0}
.drwphase{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:5px;margin-bottom:2px}
.drwdesc{font-size:10px;color:var(--t2)}
.drwbtn{width:100%;background:none;border:none;border-left:3px solid transparent;border-bottom:1px solid rgba(255,255,255,.03);padding:9px 13px;text-align:left;cursor:pointer;font-family:inherit;transition:background .15s;display:block}
.drwbtn:hover{background:var(--s3)}
.drwbtn.on{background:var(--s2);border-bottom-color:transparent}
.drwtitle{font-size:11px;line-height:1.3;color:var(--t2);display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:5px}
.drwbtn.on .drwtitle{color:var(--t1);font-weight:600}

/* MAIN (framework) */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#stephdr{padding:12px 14px;border-bottom:1px solid var(--bdr);background:var(--s1);flex-shrink:0}
.sphcrumb{font-size:9px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.sphtitle{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.02em;line-height:1.2;margin-bottom:4px}
.sphsumm{font-size:11px;color:var(--t2);line-height:1.5}
.sphrow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
#tabbar{display:flex;border-bottom:1px solid var(--bdr);background:var(--s1);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#tabbar::-webkit-scrollbar{display:none}
.tbtn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 13px;cursor:pointer;font-family:inherit;color:var(--t2);font-size:12px;white-space:nowrap;transition:all .15s}
.tbtn.on{color:var(--t1);font-weight:600}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px}
#stepnav{border-top:1px solid var(--bdr);background:var(--s1);padding:7px 13px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.snbtn{background:none;border:1px solid var(--bdr);border-radius:7px;color:var(--t2);font-size:11px;cursor:pointer;padding:6px 13px;font-family:inherit;transition:all .15s}
.snbtn:hover:not(:disabled){background:var(--s3);color:var(--t1);border-color:var(--bdr2)}
.snbtn:disabled{opacity:.3;cursor:not-allowed}
.sdots{display:flex;gap:4px;align-items:center}
.sdot{height:6px;border-radius:3px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);flex-shrink:0;min-width:6px}
#bottomnav{background:var(--s1);border-top:1px solid var(--bdr);display:flex;overflow-x:auto;padding-bottom:calc(3px + var(--sab));flex-shrink:0;scrollbar-width:none}
#bottomnav::-webkit-scrollbar{display:none}
.bni{background:none;border:none;border-top:2px solid transparent;cursor:pointer;font-family:inherit;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 8px;min-width:50px;flex-shrink:0}

/* SECTION BODY (non-framework sections) */
#secbody{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}


/* UTILITY */
.badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;color:#fff;letter-spacing:.04em;flex-shrink:0}
.pbar{height:3px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-top:7px}
.pfill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.btn{background:none;border:1px solid var(--bdr);border-radius:7px;color:var(--t1);cursor:pointer;padding:7px 14px;font-size:12px;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--bdr2);background:var(--s3)}
.btn.primary{background:#1e2a5e;border-color:#3b5bdb;color:#93c5fd}
.btn.primary:hover{background:#253570}
.btn.danger{border-color:#450a0a;color:#f87171}
.btn.danger:hover{background:#2a1010}
.btn.success{border-color:#14532d;color:#22c55e}
.btn.success:hover{background:#052210}
.btn.sm{padding:4px 10px;font-size:10px}
.btn.ai{border-color:#7c3aed;color:#c4b5fd;background:#1a0f2e}
.btn.ai:hover{background:#22103d}

/* SECTION LAYOUT */
.sec-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--s1);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sec-title{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.sec-subtitle{font-size:11px;color:var(--t2);margin-top:2px}
.sec-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;display:flex;flex-direction:column;gap:12px}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.card-hdr{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px}
.card-body{padding:14px}

/* COMMAND CARDS */
.cmdcard{background:var(--s2);border:1px solid var(--bdr);border-left:3px solid transparent;border-radius:10px;overflow:hidden;margin-bottom:10px;transition:border-color .2s}
.cmdhdr{padding:11px 13px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;gap:9px}
.cmdtitle{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:2px;letter-spacing:-.01em}
.cmdpurpose{font-size:10px;color:var(--t2)}
.copybtn{background:var(--s3);border:1px solid var(--bdr);border-radius:5px;color:var(--t2);font-size:9px;padding:4px 9px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;flex-shrink:0}
.copybtn:hover{border-color:var(--bdr2);color:var(--t1)}
.copybtn.ok{background:#052210;border-color:#16a34a;color:#22c55e}
.cmdpre{padding:11px 13px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmdpre pre{margin:0;font-size:11px;color:#7dd3fc;line-height:1.85;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono','Fira Code',Menlo,monospace}
.cv{color:#fbbf24;font-style:normal}
.cc{color:#2c2c44}
.cmdex{padding:9px 13px;background:rgba(255,255,255,.015);border-top:1px solid var(--bdr)}
.exlbl{font-size:9px;color:#404060;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.exlbl::before{content:'';display:inline-block;width:3px;height:3px;border-radius:50%;background:#a3e635}
.cmdex pre{margin:0;font-size:10.5px;color:#a3e635;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono','Fira Code',Menlo,monospace}
.detog{width:100%;background:rgba(255,255,255,.02);border:none;border-top:1px solid var(--bdr);padding:7px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:inherit;color:var(--t3);font-size:9px;text-transform:uppercase;letter-spacing:.08em;transition:all .15s}
.detog:hover{background:rgba(255,255,255,.04);color:var(--t2)}
.deblk{padding:11px 13px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:7px}
.flagrow{display:flex;gap:9px;align-items:flex-start}
.flagkey{font-size:9px;color:#e879f9;background:#1a0820;padding:2px 6px;border-radius:4px;flex-shrink:0;font-family:'SF Mono','Fira Code',Menlo,monospace;white-space:nowrap}
.flagdesc{font-size:10px;color:#8888a8;line-height:1.4;padding-top:1px}
.notebox{background:#140d00;border:1px solid #3d2900;border-radius:5px;padding:8px 11px;font-size:10px;color:#fde68a;line-height:1.5;display:flex;gap:7px}
.notebox .ni{flex-shrink:0;color:#f59e0b;font-weight:700}
.outbox{background:#010e06;border:1px solid #14532d;border-radius:5px;padding:8px 11px;font-size:10px;color:#86efac;line-height:1.5;display:flex;gap:7px}
.outbox .oi{flex-shrink:0;color:#22c55e;font-weight:700}
.toolsbox{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:11px 13px;margin-top:5px}
.toolslbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.toolswrap{display:flex;flex-wrap:wrap;gap:5px}
.toolchip{font-size:9px;background:var(--s3);border:1px solid var(--bdr);color:#60a5fa;padding:2px 8px;border-radius:4px}
.chkhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;flex-wrap:wrap;gap:6px}
.chkcount{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.togallbtn{background:none;border:1px solid var(--bdr);border-radius:5px;color:var(--t2);font-size:10px;cursor:pointer;padding:3px 9px;font-family:inherit;transition:all .15s}
.togallbtn:hover{border-color:var(--bdr2);color:var(--t1)}
.chklist{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;overflow:hidden}
.chkitem{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:background .15s;-webkit-user-select:none;user-select:none;min-height:42px}
.chkitem:last-child{border-bottom:none}
.chkitem:hover{background:var(--s3)}
.chkbox{width:17px;height:17px;border-radius:4px;border:1.5px solid #2e2e48;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px;transition:all .2s}
.chkbox.on{background:#16a34a;border-color:#16a34a}
.chktxt{font-size:12px;line-height:1.5;transition:all .2s}
.chkitem.done .chktxt{color:var(--t3);text-decoration:line-through}
.delivbox{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:11px 13px;margin-top:9px}
.delivlbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.delivtxt{font-size:12px;color:var(--t1)}
.tipcard{background:#100a00;border:1px solid #4a2e00;border-radius:9px;padding:13px;margin-bottom:9px;display:flex;gap:11px}
.tipicon{font-size:20px;flex-shrink:0;line-height:1}
.tiplbl{font-size:9px;color:#92400e;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:4px}
.tiptxt{font-size:11px;color:#fde68a;line-height:1.6}
.notelbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.notetxt{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:12px;color:#9898b8;font-size:14px;font-family:inherit;resize:vertical;outline:none;line-height:1.7;min-height:200px;transition:border-color .2s}
.notetxt:focus{border-color:var(--bdr2);color:var(--t1)}
.notefoot{font-size:10px;color:var(--t3);margin-top:5px}
.srchhdr{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.srchhdr::after{content:'';flex:1;height:1px;background:var(--bdr)}
.srchres{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;overflow:hidden}
.srchitem{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s}
.srchitem:last-child{border-bottom:none}
.srchitem:hover{background:var(--s3)}
.srchctx{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.srchtitle{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px}
.srchcmd{font-size:10px;color:var(--t2);font-family:'SF Mono','Fira Code',Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srchmark{color:#fbbf24;background:rgba(251,191,36,.12);border-radius:2px;padding:0 1px}
.empty{color:var(--t3);font-size:12px;text-align:center;padding:40px 20px;line-height:1.8}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cmdcard{animation:fadeup .2s ease both}
.cmdcard:nth-child(2){animation-delay:.04s}
.cmdcard:nth-child(3){animation-delay:.08s}
.cmdcard:nth-child(4){animation-delay:.12s}
#err{position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fca5a5;padding:12px;font-size:10px;z-index:9999;display:none;white-space:pre-wrap;font-family:'SF Mono','Fira Code',Menlo,monospace;word-break:break-all}


/* FINDINGS SECTION */
.sev-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.sev-btn{background:none;border:1px solid var(--bdr);border-radius:5px;color:var(--t2);font-size:10px;cursor:pointer;padding:4px 10px;font-family:inherit;transition:all .15s}
.sev-btn.on{font-weight:600}
.finding-row{background:var(--s2);border:1px solid var(--bdr);border-left:3px solid transparent;border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;margin-bottom:7px;animation:fadeup .15s ease both}
.finding-row:hover{border-color:var(--bdr2);transform:translateY(-1px)}
.finding-sev{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.finding-info{flex:1;min-width:0}
.finding-title{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.finding-meta{font-size:10px;color:var(--t2);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.finding-score{font-size:18px;font-weight:700;line-height:1;flex-shrink:0;text-align:right}
.finding-status{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}

/* FINDING DETAIL PANEL */
.detail-panel{position:fixed;top:0;right:-100%;width:min(480px,100%);height:100%;background:var(--s1);border-left:1px solid var(--bdr);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.detail-panel.open{right:0}
.detail-hdr{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--s1);z-index:1}
.detail-body{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1}
.field-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field-inp{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.field-inp:focus{border-color:#3b5bdb}
.field-ta{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;color:var(--t1);font-size:12px;font-family:inherit;outline:none;resize:vertical;line-height:1.6;transition:border-color .2s}
.field-ta:focus{border-color:#3b5bdb}
.field-sel{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;appearance:none;cursor:pointer}
.field-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.field-group{display:flex;flex-direction:column;flex:1;min-width:80px}

/* CVSS CALCULATOR */
.cvss-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.cvss-metric{display:flex;flex-direction:column;gap:3px}
.cvss-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.cvss-sel{background:var(--s2);border:1px solid var(--bdr);border-radius:5px;color:var(--t1);font-size:11px;font-family:inherit;padding:4px 6px;outline:none;width:100%;appearance:none;cursor:pointer}
.cvss-result{background:var(--s3);border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.cvss-score-big{font-size:28px;font-weight:800;line-height:1}
.cvss-vector{font-size:9px;color:var(--t3);font-family:'SF Mono','Fira Code',Menlo,monospace;margin-top:2px;word-break:break-all}

/* MITRE PICKER */
.mitre-search{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:8px 11px;color:var(--t1);font-size:12px;font-family:inherit;outline:none;margin-bottom:7px}
.mitre-list{max-height:160px;overflow-y:auto;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;display:flex;flex-direction:column}
.mitre-item{padding:7px 11px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.03)}
.mitre-item:last-child{border-bottom:none}
.mitre-item:hover{background:var(--s3)}
.mitre-item.sel{background:#1e1e3a;border-left:2px solid #3b5bdb}
.mitre-id{font-size:9px;color:#60a5fa;font-family:'SF Mono','Fira Code',Menlo,monospace;flex-shrink:0;width:52px}
.mitre-name{font-size:11px;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mitre-tactic{font-size:9px;color:var(--t3)}

/* AI FIELD */
.ai-field{position:relative}
.ai-overlay{position:absolute;inset:0;background:rgba(10,8,20,.85);border-radius:7px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);font-size:12px;color:#c4b5fd;gap:8px;display:none}


/* SCOPE SECTION */
.scope-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;overflow-y:auto;padding:16px 20px;min-height:0}
.scope-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.scope-item{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:8px 11px;display:flex;align-items:center;gap:8px;font-size:12px}
.scope-item-text{flex:1;min-width:0;word-break:break-all;font-family:'SF Mono','Fira Code',Menlo,monospace;font-size:11px}
.scope-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;flex-shrink:0;line-height:1;padding:0;transition:color .15s}
.scope-del:hover{color:#f87171}
.scope-add{display:flex;gap:6px;margin-top:7px}
.scope-add input{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--t1);font-size:11px;font-family:'SF Mono','Fira Code',Menlo,monospace;outline:none;transition:border-color .2s}
.scope-add input:focus{border-color:var(--bdr2)}
.contact-card{background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.contact-info{flex:1}
.contact-name{font-size:12px;font-weight:600;color:var(--t1)}
.contact-role{font-size:10px;color:var(--t2);margin-top:1px}
.contact-phone{font-size:11px;color:#22c55e;margin-top:3px;font-family:'SF Mono','Fira Code',Menlo,monospace}
.sos-box{background:#0a1628;border:1px solid #1e3a5f;border-radius:7px;padding:11px 13px;font-size:11px;color:#7dd3fc;line-height:1.7}
.sos-title{font-size:10px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}


/* TOOLS SECTION */
.tool-tabs{display:flex;overflow-x:auto;gap:5px;padding:12px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;scrollbar-width:none}
.tool-tabs::-webkit-scrollbar{display:none}
.tool-tab{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-size:11px;cursor:pointer;padding:5px 12px;white-space:nowrap;font-family:inherit;transition:all .15s}
.tool-tab.on{background:#1e2a5e;border-color:#3b5bdb;color:#93c5fd;font-weight:600}
.tool-card{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:9px}
.tool-hdr{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.tool-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px}
.tool-desc{font-size:11px;color:var(--t2);line-height:1.4}
.tool-free{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;flex-shrink:0}
.tool-free.yes{background:#052210;color:#22c55e;border:1px solid #14532d}
.tool-free.no{background:#1a0820;color:#a855f7;border:1px solid #6b21a8}
.tool-row{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.tool-row:last-child{border-bottom:none}
.tool-row-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;width:52px;flex-shrink:0;padding-top:2px}
.tool-row-cmd{font-size:11px;color:#7dd3fc;font-family:'SF Mono','Fira Code',Menlo,monospace;flex:1;min-width:0;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.tool-row-copy{background:none;border:1px solid var(--bdr);border-radius:4px;color:var(--t3);font-size:9px;padding:2px 7px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.tool-row-copy:hover{border-color:var(--bdr2);color:var(--t1)}
.tool-row-copy.ok{border-color:#16a34a;color:#22c55e}
.paid-note{font-size:10px;color:#c4b5fd;background:#1a0f2e;border:1px solid #6b21a8;border-radius:5px;padding:6px 10px;margin:0 14px 9px}


/* PAYLOADS TAB */
.payload-cat{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:9px}
.payload-cat-hdr{padding:11px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.payload-cat-hdr:hover{background:var(--s3)}
.payload-group{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.payload-group:last-child{border-bottom:none}
.payload-grp-name{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:6px}
.payload-notes{font-size:10px;color:var(--t2);margin-bottom:8px;line-height:1.5;font-style:italic}
.payload-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.payload-item:last-child{border-bottom:none}
.payload-val{font-size:11px;color:#7dd3fc;font-family:'SF Mono','Fira Code',Menlo,monospace;flex:1;min-width:0;word-break:break-all}
.payload-copy{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:2px;flex-shrink:0;transition:color .15s}
.payload-copy:hover{color:#a3e635}


/* REPORT SECTION */
.report-preview{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:16px;font-size:12px;line-height:1.8;color:var(--t2);font-family:'SF Mono','Fira Code',Menlo,monospace;overflow-x:auto;white-space:pre-wrap;word-break:break-word;flex:1;min-height:300px}
.report-preview h1,.report-preview h2,.report-preview h3{color:var(--t1);font-family:inherit;margin-bottom:4px}
.report-ctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--bdr);margin-bottom:12px}
.report-field{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)}
.report-field input{background:var(--s2);border:1px solid var(--bdr);border-radius:5px;padding:4px 8px;color:var(--t1);font-size:11px;font-family:inherit;outline:none;width:140px}


/* KILL CHAIN */
.kc-stages{display:flex;gap:0;overflow-x:auto;padding:16px 20px;flex-shrink:0;border-bottom:1px solid var(--bdr);scrollbar-width:none}
.kc-stages::-webkit-scrollbar{display:none}
.kc-stage{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:10px;min-width:140px;flex-shrink:0;position:relative}
.kc-stage + .kc-stage{margin-left:6px}
.kc-stage-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.kc-stage-items{display:flex;flex-direction:column;gap:4px;min-height:40px}
.kc-item{background:var(--s3);border:1px solid var(--bdr);border-radius:4px;padding:4px 7px;font-size:10px;color:var(--t1);display:flex;align-items:center;justify-content:space-between;gap:4px}
.kc-item-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:0;line-height:1;flex-shrink:0}
.kc-add{background:none;border:1px dashed var(--bdr);border-radius:4px;padding:4px;width:100%;font-size:10px;color:var(--t3);cursor:pointer;font-family:inherit;margin-top:4px;transition:all .15s}
.kc-add:hover{border-color:var(--bdr2);color:var(--t1)}
.kc-narrative{padding:14px 20px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.kc-nar-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between}
.kc-nar-ta{width:100%;flex:1;min-height:120px;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;color:var(--t2);font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.7;transition:border-color .2s}
.kc-nar-ta:focus{border-color:var(--bdr2);color:var(--t1)}


/* TIMER */
.timer-display{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.timer-clock{font-size:48px;font-weight:800;letter-spacing:-.04em;color:var(--t1);font-family:'SF Mono','Fira Code',Menlo,monospace;line-height:1}
.timer-phase-label{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.12em}
.timer-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.timer-phase-pick{display:flex;gap:6px;overflow-x:auto;padding:12px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;scrollbar-width:none}
.timer-phase-pick::-webkit-scrollbar{display:none}
.tph-btn{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-size:11px;cursor:pointer;padding:5px 12px;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.tph-btn.on{font-weight:600}
.timer-log{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:6px}
.timer-row{background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.timer-row-ph{font-size:11px;font-weight:600;color:var(--t1);flex:1}
.timer-row-dur{font-size:13px;font-weight:700;font-family:'SF Mono','Fira Code',Menlo,monospace}
.timer-row-date{font-size:10px;color:var(--t3)}
.timer-total{padding:10px 20px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.timer-total-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.timer-total-val{font-size:16px;font-weight:700;font-family:'SF Mono','Fira Code',Menlo,monospace;color:var(--t1)}


/* PROFILES */
.profile-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.profile-item{background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.profile-item:hover{border-color:var(--bdr2)}
.profile-item.on{border-color:#3b5bdb;background:#1e1e3a}
.profile-name{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.profile-meta{font-size:10px;color:var(--t2)}

/* SETTINGS / AI */
.settings-section{margin-bottom:16px}
.settings-lbl{font-size:11px;font-weight:700;color:var(--t1);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.api-status{font-size:10px;color:var(--t3)}
.api-status.ok{color:#22c55e}
.api-status.err{color:#f87171}
.code-block{background:#060912;border:1px solid var(--bdr);border-radius:7px;padding:12px 14px;font-size:10px;font-family:'SF Mono','Fira Code',Menlo,monospace;color:#86efac;white-space:pre-wrap;overflow-x:auto;line-height:1.6}


/* SCROLLBARS */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

/* RESPONSIVE */
@media (min-width: 640px) {
  #drawer{width:300px}
  #bottomnav{display:none}
  .sec-body{padding:18px 24px}
  .scope-grid{padding:18px 24px}
}
@media (min-width: 1024px) {
  #hambtn{display:none !important}
  #phasenav{display:none !important}
  #bottomnav{display:none !important}
  #mask{display:none !important}
  #drawer{position:relative !important;transform:none !important;width:260px !important;transition:none !important;flex-shrink:0;height:100%;display:flex;flex-direction:column}
  .sidebar-phases{display:flex !important}
  #content{padding:20px 24px}
  .cmdcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.4);border-color:var(--bdr2)}
  .chklist{display:grid;grid-template-columns:1fr 1fr}
  .chkitem{border-right:1px solid rgba(255,255,255,.03)}
  .chkitem:nth-child(2n){border-right:none}
  .deblk{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .notebox,.outbox{grid-column:1/-1}
  .detail-panel{width:520px}
  .scope-grid{grid-template-columns:1fr 1fr 1fr}
}
@media (min-width: 1280px) {
  #drawer{width:280px !important}
  #content{padding:22px 28px}
}

/* ACCESSIBILITY: keyboard focus + reduced motion */
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,a:focus-visible{outline:2px solid #4f6ef7;outline-offset:2px}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}

function getPhase(id){for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===id)return PHASES[i];}return PHASES[0];}
function getStep(ph,sid){for(var i=0;i<ph.steps.length;i++){if(ph.steps[i].id===sid)return ph.steps[i];}return ph.steps[0];}
function phaseIdx(){for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===APP.phase)return i;}return 0;}
function stepIdx(ph){for(var i=0;i<ph.steps.length;i++){if(ph.steps[i].id===APP.step)return i;}return 0;}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copy(txt,btn){
  navigator.clipboard.writeText(txt).then(function(){
    if(!btn)return;
    var orig=btn.textContent;
    btn.textContent='Copied!';
    btn.classList.add('ok');
    setTimeout(function(){btn.textContent=orig;btn.classList.remove('ok');},1200);
  });
}
var COPYDATA={};
var _copyCtr=0;
function regCopy(s){
  var id='cp'+(_copyCtr++);
  COPYDATA[id]=s;
  return id;
}
function copyById(id,btn){
  copy(COPYDATA[id],btn);
}
function fmtDate(ts){var d=new Date(ts);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});}

var CVSS_AV={N:0.85,A:0.62,L:0.55,P:0.2};
var CVSS_AC={L:0.77,H:0.44};
var CVSS_PR={N:{U:0.85,C:0.85},L:{U:0.62,C:0.50},H:{U:0.27,C:0.50}};
var CVSS_UI={N:0.85,R:0.62};
var CVSS_CIA={N:0,L:0.22,H:0.56};

function calcCVSS(m){
  var av=CVSS_AV[m.AV]||0.85,ac=CVSS_AC[m.AC]||0.77;
  var pr=((CVSS_PR[m.PR]||{})[m.S])||0.85;
  var ui=CVSS_UI[m.UI]||0.85;
  var C=CVSS_CIA[m.C]||0,I=CVSS_CIA[m.I]||0,A=CVSS_CIA[m.A]||0;
  var ISC=1-(1-C)*(1-I)*(1-A);
  var Imp=m.S==='U'?6.42*ISC:7.52*(ISC-0.029)-3.25*Math.pow(ISC-0.02,15);
  var Exp=8.22*av*ac*pr*ui;
  if(Imp<=0)return '0.0';
  var raw=m.S==='U'?Math.min(Imp+Exp,10):Math.min(1.08*(Imp+Exp),10);
  return (Math.ceil(raw*10)/10).toFixed(1);
}
function cvssToSev(s){var n=parseFloat(s);if(n===0)return 'Info';if(n<=3.9)return 'Low';if(n<=6.9)return 'Medium';if(n<=8.9)return 'High';return 'Critical';}
var SEV_COLORS={Critical:'#dc2626',High:'#ea580c',Medium:'#ca8a04',Low:'#16a34a',Info:'#475569'};

function ringHTML(pct,col,sz,lbl){
  var r=sz/2-4,c=sz/2,circ=2*Math.PI*r,dash=pct/100*circ;
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">'
    +'<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#1c1c2e" stroke-width="3.5"/>'
    +'<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="3.5"'
    +' stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'" stroke-linecap="round"'
    +' transform="rotate(-90 '+c+' '+c+')" stroke-opacity=".9"/>'
    +'<text x="'+c+'" y="'+(c+3)+'" text-anchor="middle" fill="#c8c8d8" font-size="8" font-weight="700" font-family="system-ui">'+lbl+'</text>'
    +'</svg>';
}


function setSection(s){
  APP.section=s;
  document.querySelectorAll('.secbtn').forEach(function(b){b.classList.toggle('on',b.dataset.sec===s);});
  var isF=s==='framework';
  ['phasenav','wrap','bottomnav'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.style.display=isF?'':'none';
  });
  var sb=document.getElementById('secbody');
  var srch=document.getElementById('searchbox');
  if(isF){
    sb.style.display='none';
    if(srch)srch.style.display='';
    renderAll();
  }else{
    sb.style.display='flex';
    sb.style.flexDirection='column';
    sb.style.overflow='hidden';
    if(srch)srch.style.display='none';
    if(s==='findings')renderFindings(sb);
    else if(s==='scope')renderScope(sb);
    else if(s==='tools')renderTools(sb);
    else if(s==='payloads')renderPayloads(sb);
    else if(s==='report')renderReport(sb);
    else if(s==='killchain')renderKillChain(sb);
    else if(s==='timer')renderTimer(sb);
    else if(s==='profiles')renderProfiles(sb);
    else if(s==='settings')renderSettings(sb);
  }
}


function toggleDrawer(){APP.drawer=!APP.drawer;rDrawer();}
function closeDrawer(){APP.drawer=false;rDrawer();}
function openDrawer(){APP.drawer=true;rDrawer();}

function rDrawer(){
  var ph=getPhase(APP.phase);
  var mask=document.getElementById('mask');
  var drawer=document.getElementById('drawer');
  var hambtn=document.getElementById('hambtn');
  if(mask)mask.classList.toggle('on',APP.drawer);
  if(drawer)drawer.classList.toggle('on',APP.drawer);
  if(hambtn)hambtn.classList.toggle('on',APP.drawer);

  var steps=ph.steps||[];
  var h='<div class="drwhdr">';
  h+='<div class="drwphase" style="color:'+ph.color+'">'+ph.icon+' '+ph.label+'</div>';
  h+='<div class="drwdesc">'+esc(ph.desc)+'</div></div>';
  var doneCount=0,total=0;
  steps.forEach(function(st){
    total+=st.checklist?st.checklist.length:0;
    (st.checklist||[]).forEach(function(c,i){if(APP.ck[st.id+'_'+i])doneCount++;});
  });
  h+='<div class="pbar" style="margin:0 10px 6px;height:2px"><div class="pfill" style="width:'+(total?Math.round(doneCount/total*100):0)+'%;background:'+ph.color+'"></div></div>';
  steps.forEach(function(st){
    var done=0,total2=st.checklist?st.checklist.length:0;
    (st.checklist||[]).forEach(function(c,i){if(APP.ck[st.id+'_'+i])done++;});
    var pct=total2?Math.round(done/total2*100):0;
    var isOn=APP.step===st.id;
    var pri=st.priority||'medium';
    var priC=pri==='critical'?'#dc2626':pri==='high'?'#ea580c':'#475569';
    h+='<button class="drwbtn'+(isOn?' on':'')+'" onclick="selectStep(\''+st.id+'\')" style="'+(isOn?'border-left-color:'+ph.color+';':'')+'">'+
      '<div class="drwtitle"><span>'+esc(st.title)+'</span>'+
      '<span class="badge" style="background:'+priC+';font-size:7px">'+pri.toUpperCase()+'</span></div>'+
      '<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+ph.color+'"></div></div>'+
      '</button>';
  });

  var sph='';
  PHASES.forEach(function(p){
    var totPh=0,donePh=0;
    (p.steps||[]).forEach(function(st){
      (st.checklist||[]).forEach(function(c,i){totPh++;if(APP.ck[st.id+'_'+i])donePh++;});
    });
    var pct=totPh?Math.round(donePh/totPh*100):0;
    sph+='<button class="sph-btn'+(p.id===APP.phase?' on':'')+'" onclick="selectPhase(\''+p.id+'\')">'+
      '<span class="sph-ico">'+p.icon+'</span>'+
      '<div class="sph-info"><div class="sph-lbl" style="color:'+(p.id===APP.phase?p.color:'var(--t1)')+'">'+p.label+'</div>'+
      '<div class="sph-pct">'+pct+'% complete</div></div>'+
      ringHTML(pct,p.color,26,pct+'%')+'</button>';
  });

  if(drawer)drawer.innerHTML='<div class="sidebar-phases">'+sph+'</div>'+h;
}

function selectPhase(id){
  APP.phase=id;
  APP.drawer=false;
  var ph=getPhase(id);
  APP.step=(ph.steps&&ph.steps[0])?ph.steps[0].id:'';
  APP.tab='cmd';
  APP.q='';
  psave('phase',APP.phase);psave('step',APP.step);
  renderAll();
}

function selectStep(id){
  APP.step=id;
  APP.tab='cmd';
  APP.drawer=false;
  APP.q='';
  psave('step',APP.step);
  renderAll();
}

function rPhaseNav(){
  var h='';
  PHASES.forEach(function(p){
    var totPh=0,donePh=0;
    (p.steps||[]).forEach(function(st){
      (st.checklist||[]).forEach(function(c,i){totPh++;if(APP.ck[st.id+'_'+i])donePh++;});
    });
    var pct=totPh?Math.round(donePh/totPh*100):0;
    var on=p.id===APP.phase;
    h+='<button class="ptab'+(on?' on':'')+'" onclick="selectPhase(\''+p.id+'\')" style="border-bottom-color:'+(on?p.color:'transparent')+'">'
      +'<span class="pico">'+p.icon+'</span>'
      +'<span class="plbl" style="color:'+(on?p.color:'var(--t2)')+'">'+p.short+'</span>'
      +'</button>';

}

function rStepHdr(){
  var ph=getPhase(APP.phase);
  var st=getStep(ph,APP.step);
  var done=0,tot=st.checklist?st.checklist.length:0;
  (st.checklist||[]).forEach(function(c,i){if(APP.ck[st.id+'_'+i])done++;});

    +'<div class="sphtitle">'+esc(st.title)+'</div>'
    +'<div class="sphsumm">'+esc(st.summary||'')+'</div>'
    +'</div>'

    +'<span class="badge" style="background:'+priColors[pri]+'">'+(pri||'').toUpperCase()+'</span>'
    +ringHTML(pct,ph.color,38,pct+'%')+'</div></div>'

}

function rTabBar(){
  var ph=getPhase(APP.phase);
  var st=getStep(ph,APP.step);
  var tabs=[['cmd','Commands'],['chk','Checklist'],['inf','Info'],['nts','Notes']];
  if(APP.q)tabs=[['search','Search Results']];
  var h='';
  tabs.forEach(function(t){
    h+='<button class="tbtn'+(APP.tab===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';
  });
  if(!APP.q){
    var cmds=st.commands||[];
    h='<button class="tbtn'+(APP.tab==='cmd'?' on':'')+'" onclick="setTab(\'cmd\')">Commands ('+cmds.length+')</button>'
     +'<button class="tbtn'+(APP.tab==='chk'?' on':'')+'" onclick="setTab(\'chk\')">Checklist ('+(st.checklist||[]).length+')</button>'
     +'<button class="tbtn'+(APP.tab==='inf'?' on':'')+'" onclick="setTab(\'inf\')">Info</button>'

function setTab(t){APP.tab=t;rTabBar();rContent();}

function rContent(){
  if(APP.q){rSearch();return;}
  if(APP.tab==='cmd')rCmds();
  else if(APP.tab==='chk')rChk();
  else if(APP.tab==='inf')rInf();
  else if(APP.tab==='nts')rNts();
}

function hlCmd(s,q){
  if(!q)return esc(s);
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(s).replace(re,'<mark class="srchmark">$1</mark>');
}

function rCmds(){
  var ph=getPhase(APP.phase);
  var st=getStep(ph,APP.step);
  var cmds=st.commands||[];
  if(!cmds.length){document.getElementById('content').innerHTML='<div class="empty">No commands for this step</div>';return;}
  var h='';
  cmds.forEach(function(cmd){
    var exp=APP.exp[cmd.id];
    var cmdClean=cmd.cmd||'';
    h+='<div class="cmdcard" style="border-left-color:'+ph.color+'">'
      +'<div class="cmdhdr"><div><div class="cmdtitle">'+esc(cmd.title)+'</div><div class="cmdpurpose">'+esc(cmd.purpose||'')+'</div></div>'
      +'<button class="copybtn" onclick="copyById(\''+regCopy(cmdClean)+'\',this)">&#9113; Copy</button></div>'
      +'<div class="cmdpre"><pre>'+fmtCmd(cmdClean)+'</pre></div>';
    if(cmd.example){
      h+='<div class="cmdex"><div class="exlbl">EXAMPLE</div><pre>'+esc(cmd.example)+'</pre></div>';
    }
    h+='<button class="detog" onclick="toggleExp(\''+cmd.id+'\')"><span>FLAGS & DETAILS</span><span>'+(exp?'▲':'▼')+'</span></button>';
    if(exp){
      h+='<div class="deblk">';
      (cmd.flags||[]).forEach(function(f){
        h+='<div class="flagrow"><span class="flagkey">'+esc(f.f)+'</span><span class="flagdesc">'+esc(f.d)+'</span></div>';
      });
      if(cmd.note)h+='<div class="notebox"><span class="ni">TIP</span> '+esc(cmd.note)+'</div>';
      if(cmd.out)h+='<div class="outbox"><span class="oi">OUT</span> '+esc(cmd.out)+'</div>';
      h+='</div>';
    }
    h+='</div>';
  });
  document.getElementById('content').innerHTML=h;
}

function fmtCmd(cmd){
  return esc(cmd).replace(/\{([^}]+)\}/g,'<i class="cv">{$1}</i>')
    .replace(/(#[^\n]*)/g,'<span class="cc">$1</span>');
}

function toggleExp(id){
  APP.exp[id]=!APP.exp[id];
  var content=document.getElementById('content');
  if(!content)return;
  rCmds();
}

function rChk(){
  var ph=getPhase(APP.phase);
  var st=getStep(ph,APP.step);
  var items=st.checklist||[];
  var done=0;
  items.forEach(function(c,i){if(APP.ck[st.id+'_'+i])done++;});
  var pct=items.length?Math.round(done/items.length*100):0;
  var h='<div class="chkhdr">'
    +'<div class="chkcount">'+done+' / '+items.length+' COMPLETE ('+pct+'%)</div>'
    +'<button class="togallbtn" onclick="toggleAll()">'+( done===items.length?'Uncheck All':'Check All')+'</button>'
    +'</div>'
    +'<div class="chklist">';
  items.forEach(function(c,i){
    var k=st.id+'_'+i;
    var chk=APP.ck[k];
    h+='<div class="chkitem'+(chk?' done':'')+'" onclick="toggleChk(\''+k+'\')">'
      +'<div class="chkbox'+(chk?' on':'')+'">'+(chk?'&#10003;':'')+'</div>'
      +'<div class="chktxt">'+esc(c)+'</div></div>';
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function toggleChk(k){
  APP.ck[k]=!APP.ck[k];
  psave('ck',APP.ck);
  rChk();
  rStepHdr();
  updateRing();
}

function toggleAll(){
  var ph=getPhase(APP.phase);
  var st=getStep(ph,APP.step);
  var items=st.checklist||[];
  var done=0;
  items.forEach(function(c,i){if(APP.ck[st.id+'_'+i])done++;});
  var setTo=done!==items.length;
  items.forEach(function(c,i){APP.ck[st.id+'_'+i]=setTo;});
  psave('ck',APP.ck);
  rChk();rStepHdr();updateRing();
}

function rInf(){
  var ph=getPhase(APP.phase);
  var st=getStep(ph,APP.step);
  var h='';
  if(st.tip){
    h+='<div class="tipcard"><span class="tipicon">&#9889;</span>'
      +'<div><div class="tiplbl">ELITE TIP</div><div class="tiptxt">'+esc(st.tip)+'</div></div></div>';
  }

    h+='<div class="delivbox"><div class="delivlbl">DELIVERABLE</div><div class="delivtxt">'+esc(st.deliverable)+'</div></div>';

function rNts(){

  var st=getStep(ph,APP.step);

function saveNote(k,v){
  APP.notes[k]=v;
  psave('notes',APP.notes);
}

function rSearch(){
  var q=APP.q.toLowerCase();
  if(!q){rCmds();return;}
  var results=[];
  PHASES.forEach(function(ph){
    (ph.steps||[]).forEach(function(st){
      (st.commands||[]).forEach(function(cmd){
        var hay=(cmd.title+' '+cmd.purpose+' '+cmd.cmd+' '+(cmd.example||'')+' '+(cmd.note||'')).toLowerCase();
        if(hay.indexOf(q)>=0)results.push({ph:ph,st:st,cmd:cmd});
      });
    });
  });
  var h='<div class="srchhdr">'+results.length+' results for "'+esc(APP.q)+'"</div>';
  if(!results.length){h+='<div class="empty">No commands match your search</div>';document.getElementById('content').innerHTML=h;return;}
  h+='<div class="srchres">';
  results.forEach(function(r){
    var clean=r.cmd.cmd||'';
    h+='<div class="srchitem" onclick="goCmd(\''+r.ph.id+'\',\''+r.st.id+'\')">'
      +'<div class="srchctx">'+r.ph.icon+' '+esc(r.ph.label)+' › '+esc(r.st.title)+'</div>'
      +'<div class="srchtitle">'+hlCmd(r.cmd.title,APP.q)+'</div>'
      +'<div class="srchcmd">'+hlCmd(clean.split('\n')[0],APP.q)+'</div>'
      +'</div>';
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function goCmd(phId,stId){
  clearSearch();
  APP.phase=phId;APP.step=stId;APP.tab='cmd';
  renderAll();
}

function handleSearch(v){
  APP.q=v;
  document.getElementById('clrbtn').style.display=v?'block':'none';
  if(v){APP.tab='search';}else{APP.tab='cmd';}
  rTabBar();rContent();
}
function clearSearch(){
  document.getElementById('searchinp').value='';
  document.getElementById('clrbtn').style.display='none';
  APP.q='';APP.tab='cmd';
  rTabBar();rContent();
}

function rStepNav(){
  var ph=getPhase(APP.phase);
  var steps=ph.steps||[];
  var si=stepIdx(ph);
  var h='<button class="snbtn" onclick="prevStep()" '+(si===0?'disabled':'')+'>&#8592; Prev</button>';
  h+='<div class="sdots">';
  steps.forEach(function(st,i){
    var done=0,tot=st.checklist?st.checklist.length:0;
    (st.checklist||[]).forEach(function(c,ii){if(APP.ck[st.id+'_'+ii])done++;});
    var pct=tot?done/tot:0;
    var w=i===si?18:6;
    h+='<div class="sdot" onclick="selectStep(\''+st.id+'\')" style="width:'+w+'px;background:'+(i===si?ph.color:pct===1?'#166534':'#2e2e4e')+'" title="'+esc(st.title)+'"></div>';
  });
  h+='</div>';
  h+='<button class="snbtn" onclick="nextStep()" '+(si===steps.length-1?'disabled':'')+'>Next &#8594;</button>';

function prevStep(){var ph=getPhase(APP.phase);var si=stepIdx(ph);if(si>0){APP.step=ph.steps[si-1].id;psave('step',APP.step);renderAll();}}
function nextStep(){var ph=getPhase(APP.phase);var steps=ph.steps;var si=stepIdx(ph);if(si<steps.length-1){APP.step=steps[si+1].id;psave('step',APP.step);renderAll();}}

function rBN(){
  var h='';
  PHASES.forEach(function(p){
    var totPh=0,donePh=0;
    (p.steps||[]).forEach(function(st){
      (st.checklist||[]).forEach(function(c,i){totPh++;if(APP.ck[st.id+'_'+i])donePh++;});
    });
    var pct=totPh?Math.round(donePh/totPh*100):0;
    var on=p.id===APP.phase;

      +'<span style="font-size:8px;color:'+(on?p.color:'var(--t3)')+'">'+p.short+'</span>'
      +'</button>';
  });
  document.getElementById('bottomnav').innerHTML=h;
}

function updateRing(){
  var tot=0,done=0;
  PHASES.forEach(function(ph){
    (ph.steps||[]).forEach(function(st){
      (st.checklist||[]).forEach(function(c,i){tot++;if(APP.ck[st.id+'_'+i])done++;});
    });
  });
  var pct=tot?Math.round(done/tot*100):0;
  var ph=getPhase(APP.phase);
  document.getElementById('totalring').innerHTML=ringHTML(pct,ph.color,34,pct+'%');

function renderAll(){

function startEditEng(){
  var n=prompt('Engagement name:',APP.eng);
  if(n!==null&&n.trim()){APP.eng=n.trim();psave('eng',APP.eng);document.getElementById('engname').textContent=APP.eng;}
}

function doReset(){
  if(!confirm('Reset ALL progress for this profile? This cannot be undone.'))return;
  APP.ck={};APP.notes={};psave('ck',{});psave('notes',{});
  renderAll();
}


var CURR_CVSS={AV:'N',AC:'L',PR:'N',UI:'N',S:'U',C:'H',I:'H',A:'H'};
var MITRE_SEARCH='';

function renderFindings(el){
  var findings=APP.findings||[];
  var sevCounts={Critical:0,High:0,Medium:0,Low:0,Info:0};
  findings.forEach(function(f){sevCounts[f.severity]=(sevCounts[f.severity]||0)+1;});
  var filtered=findings.filter(function(f){
    var sevOk=APP.fFilter==='all'||f.severity===APP.fFilter;
    var statOk=APP.fStatus==='all'||f.status===APP.fStatus;
    return sevOk&&statOk;
  });

  var h='<div class="sec-hdr">';
  h+='<div><div class="sec-title">&#128300; Findings Tracker</div>';
  h+='<div class="sec-subtitle">'+findings.length+' findings — ';
  var parts=[];
  Object.keys(sevCounts).forEach(function(s){if(sevCounts[s])parts.push('<span style="color:'+SEV_COLORS[s]+'">'+sevCounts[s]+' '+s+'</span>');});
  h+=parts.join(' | ')+'</div></div>';
  h+='<button class="btn primary" onclick="openFinding(null)">+ Add Finding</button></div>';

  h+='<div style="padding:12px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap;background:var(--s1)">';
  var sevFilters=['all','Critical','High','Medium','Low','Info'];
  sevFilters.forEach(function(s){
    var col=s==='all'?'var(--t2)':SEV_COLORS[s];
    h+='<button class="sev-btn'+(APP.fFilter===s?' on':'')+'" onclick="setFFilter(\''+s+'\')" style="'+(APP.fFilter===s?'border-color:'+col+';color:'+col+';background:rgba(0,0,0,.3)':'')+'">'+s.charAt(0).toUpperCase()+s.slice(1)+'</button>';
  });
  h+='<span style="margin-left:4px;color:var(--bdr)">|</span>';
  ['all','Open','Fixed','Risk Accepted'].forEach(function(s){
    h+='<button class="sev-btn'+(APP.fStatus===s?' on':'')+'" onclick="setFStatus(\''+s+'\')" style="'+(APP.fStatus===s?'border-color:var(--t2);color:var(--t1)':'')+'">'+s+'</button>';
  });
  h+='</div>';

  h+='<div class="sec-body">';
  if(!filtered.length){
    h+='<div class="empty">&#128300; No findings yet.<br>Click "Add Finding" to log your first vulnerability.</div>';
  }else{
    filtered.sort(function(a,b){
      var order={Critical:0,High:1,Medium:2,Low:3,Info:4};
      return (order[a.severity]||4)-(order[b.severity]||4);
    });
    filtered.forEach(function(f){
      var col=SEV_COLORS[f.severity]||'#475569';
      h+='<div class="finding-row" onclick="openFinding(\''+f.id+'\')" style="border-left-color:'+col+'">'
        +'<div class="finding-sev" style="background:'+col+'"></div>'
        +'<div class="finding-info">'
        +'<div class="finding-title">'+esc(f.title||'Untitled Finding')+'</div>'
        +'<div class="finding-meta">'
        +(f.affected?'<span>'+esc(f.affected)+'</span>':'')
        +(f.mitre?'<span style="color:#60a5fa">'+esc(f.mitre)+'</span>':'')
        +'<span style="color:'+(f.status==='Fixed'?'#22c55e':f.status==='Risk Accepted'?'#f59e0b':'#94a3b8')+'">'+esc(f.status||'Open')+'</span>'
        +'</div></div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div class="finding-score" style="color:'+col+'">'+esc(f.cvss_score||'—')+'</div>'
        +'<div class="finding-status">CVSS</div></div>'
        +'</div>';
    });
  }

  // Summary stats
  if(findings.length){
    h+='<div class="card"><div class="card-hdr"><div class="card-title">&#128202; Summary</div></div><div class="card-body" style="display:flex;gap:16px;flex-wrap:wrap">';
    Object.keys(sevCounts).forEach(function(s){
      if(sevCounts[s]){
        h+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:'+SEV_COLORS[s]+'">'+sevCounts[s]+'</div>'
          +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">'+s+'</div></div>';
      }
    });
    var openCount=findings.filter(function(f){return f.status==='Open';}).length;
    h+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:#f87171">'+openCount+'</div>'
      +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">Open</div></div>';
    h+='</div></div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function setFFilter(v){APP.fFilter=v;setSection('findings');}
function setFStatus(v){APP.fStatus=v;setSection('findings');}

function openFinding(id){
  var f=null;
  if(id){f=APP.findings.find(function(x){return x.id===id;});}
  if(!f){
    f={id:genId(),title:'',severity:'High',status:'Open',affected:'',description:'',business_impact:'',evidence:'',remediation:'',mitre:'',mitre_name:'',cvss_score:'',cvss_vector:'',created:Date.now(),
      cvss:{AV:'N',AC:'L',PR:'N',UI:'N',S:'U',C:'H',I:'H',A:'H'}};
  }
  APP.editFinding=JSON.parse(JSON.stringify(f));
  CURR_CVSS=Object.assign({AV:'N',AC:'L',PR:'N',UI:'N',S:'U',C:'H',I:'H',A:'H'},f.cvss||{});
  MITRE_SEARCH='';
  renderFindingPanel();
}

function closeFinding(){
  APP.editFinding=null;
  document.getElementById('findingPanel').classList.remove('open');
}

function renderFindingPanel(){
  var f=APP.editFinding;
  var score=calcCVSS(CURR_CVSS);

function syncFindingFields(){
  var f=APP.editFinding;
  if(!f)return;
  var ids=[['fp_title','title'],['fp_status','status'],['fp_affected','affected'],['fp_desc','description'],['fp_impact','business_impact'],['fp_evidence','evidence'],['fp_remediaton','remediation']];
  ids.forEach(function(pair){
    var el=document.getElementById(pair[0]);
    if(el)f[pair[1]]=el.value;
  });
}

function setCVSS(k,v){
  syncFindingFields();
  CURR_CVSS[k]=v;
  var score=calcCVSS(CURR_CVSS);
  var sev=cvssToSev(score);
  var col=SEV_COLORS[sev]||'#475569';
  if(APP.editFinding){
    APP.editFinding.cvss=JSON.parse(JSON.stringify(CURR_CVSS));
    APP.editFinding.cvss_score=score;
    APP.editFinding.severity=sev;
  }
  renderFindingPanel();
}

function filterMitre(v){MITRE_SEARCH=v;syncFindingFields();renderFindingPanel();setTimeout(function(){var el=document.getElementById('mitre_search');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},10);}

function selectMitre(id,name){
  syncFindingFields();
  if(APP.editFinding){APP.editFinding.mitre=id;APP.editFinding.mitre_name=name;}
  MITRE_SEARCH='';
  renderFindingPanel();
}

function clearMitre(){
  syncFindingFields();
  if(APP.editFinding){APP.editFinding.mitre='';APP.editFinding.mitre_name='';}
  renderFindingPanel();
}

function saveFindingFromPanel(){
  var f=APP.editFinding;
  if(!f)return;
  f.title=document.getElementById('fp_title').value||'Untitled';
  f.status=document.getElementById('fp_status').value;
  f.affected=document.getElementById('fp_affected').value;
  f.description=document.getElementById('fp_desc').value;
  f.business_impact=document.getElementById('fp_impact').value;
  f.evidence=document.getElementById('fp_evidence').value;
  f.remediation=document.getElementById('fp_remediaton').value;
  f.cvss=JSON.parse(JSON.stringify(CURR_CVSS));
  f.cvss_score=calcCVSS(CURR_CVSS);
  f.severity=cvssToSev(f.cvss_score);
  var cvssV='CVSS:3.1/AV:'+CURR_CVSS.AV+'/AC:'+CURR_CVSS.AC+'/PR:'+CURR_CVSS.PR+'/UI:'+CURR_CVSS.UI+'/S:'+CURR_CVSS.S+'/C:'+CURR_CVSS.C+'/I:'+CURR_CVSS.I+'/A:'+CURR_CVSS.A;
  f.cvss_vector=cvssV;
  var idx=APP.findings.findIndex(function(x){return x.id===f.id;});
  if(idx>=0)APP.findings[idx]=f;else APP.findings.push(f);
  psave('findings',APP.findings);
  closeFinding();
  setSection('findings');
}

function deleteFindingById(id){
  if(!id)return;
  if(!confirm('Delete this finding?'))return;
  APP.findings=APP.findings.filter(function(f){return f.id!==id;});
  psave('findings',APP.findings);
  closeFinding();
  setSection('findings');
}


function aiCall(prompt,onSuccess,onError){
  var key=APP.apiKey;
  var endpoint=APP.apiEndpoint||'/api/chat';
  if(!key&&endpoint==='/api/chat'){
    onError('No API key. Add your Anthropic API key in AI + Settings.');
    return;
  }
  var body={prompt:prompt};
  var headers={'Content-Type':'application/json'};
  if(key&&endpoint!=='/api/chat'){
    // Direct Anthropic API
    headers['x-api-key']=key;
    headers['anthropic-version']='2023-06-01';
    body={model:'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content:prompt}]};
    endpoint='https://api.anthropic.com/v1/messages';
  }
  fetch(endpoint,{method:'POST',headers:headers,body:JSON.stringify(body)})
  .then(function(r){return r.json();})
  .then(function(data){
    var text='';
    if(data.content&&data.content[0])text=data.content[0].text||data.text||'';
    else if(data.text)text=data.text;
    onSuccess(text);
  })
  .catch(function(e){onError(e.toString());});
}

function aiBusinessImpact(){
  var f=APP.editFinding;
  if(!f)return;
  var title=document.getElementById('fp_title').value||f.title||'';
  var desc=document.getElementById('fp_desc').value||f.description||'';
  var affected=document.getElementById('fp_affected').value||f.affected||'';
  var sev=cvssToSev(calcCVSS(CURR_CVSS));
  if(!title&&!desc){alert('Add a title and description first.');return;}
  var prompt='You are a senior penetration testing consultant writing a report for C-suite executives. Transform this technical security finding into clear business impact language a CEO, CFO, or Board member would understand. Focus on financial risk (breach costs, fines), operational risk (downtime, data loss), reputational risk, and compliance violations. Be specific with real-world impact. Write 3-4 concise sentences. No markdown, no headers, just the paragraph.\n\nFinding: '+title+'\nSeverity: '+sev+'\nAffected: '+affected+'\nTechnical detail: '+desc;
  var overlay=document.getElementById('ai_impact_overlay');
  var ta=document.getElementById('fp_impact');
  if(overlay)overlay.style.display='flex';
  if(ta)ta.style.opacity='0.3';
  aiCall(prompt,function(text){
    if(overlay)overlay.style.display='none';
    if(ta){ta.style.opacity='1';ta.value=text;}
    if(APP.editFinding)APP.editFinding.business_impact=text;
  },function(err){
    if(overlay)overlay.style.display='none';
    if(ta)ta.style.opacity='1';
    alert('AI Error: '+err);
  });
}

function scopeField(k,v){APP.scope[k]=v;}

function addScope(type){
  var inp=document.getElementById(type==='in'?'sc_in_inp':type==='oot'?'sc_oot_inp':'sc_win_inp');
  if(!inp||!inp.value.trim())return;
  var v=inp.value.trim();
  if(type==='in')APP.scope.targets.push(v);
  else if(type==='oot')APP.scope.oot.push(v);
  else APP.scope.windows.push(v);
  inp.value='';
  renderScope(document.getElementById('secbody'));
}

function removeScope(type,i){
  if(type==='in')APP.scope.targets.splice(i,1);
  else if(type==='oot')APP.scope.oot.splice(i,1);
  else if(type==='win')APP.scope.windows.splice(i,1);
  else if(type==='contact')APP.scope.contacts.splice(i,1);
  renderScope(document.getElementById('secbody'));
}

function addContact(){
  var name=document.getElementById('sc_c_name').value.trim();
  var role=document.getElementById('sc_c_role').value.trim();
  var phone=document.getElementById('sc_c_phone').value.trim();
  if(!name)return;
  APP.scope.contacts.push({name:name,role:role,phone:phone});
  renderScope(document.getElementById('secbody'));
}

function saveScope(){
  psave('scope',APP.scope);
  var sb=document.getElementById('secbody');
  if(sb){renderScope(sb);}
  // flash
  var btn=document.querySelector('.sec-hdr .btn');
  if(btn){var orig=btn.textContent;btn.textContent='Saved!';setTimeout(function(){btn.textContent=orig;},1000);}
}

function generateReport(){
  var findings=APP.findings||[];
  var scope=APP.scope||{};
  var tester=APP.reportTester||'[Tester Name]';
  var date=APP.reportDate||(new Date().toISOString().split('T')[0]);
  var client=scope.client||APP.eng||'[Client Name]';
  var sevOrder={Critical:0,High:1,Medium:2,Low:3,Info:4};
  var sorted=findings.slice().sort(function(a,b){return (sevOrder[a.severity]||4)-(sevOrder[b.severity]||4);});

  var sevCounts={Critical:0,High:0,Medium:0,Low:0,Info:0};
  findings.forEach(function(f){sevCounts[f.severity]=(sevCounts[f.severity]||0)+1;});
  var openCount=findings.filter(function(f){return f.status==='Open';}).length;

  var out='# Penetration Test Report\n';
  out+='\n**Client:** '+client;
  out+='\n**Engagement Type:** '+(scope.type||'[Test Type]');
  out+='\n**Test Period:** '+(scope.start||'[Start]')+' to '+(scope.end||'[End]');
  out+='\n**Tester:** '+tester;
  out+='\n**Report Date:** '+date;
  out+='\n\n---\n';
  out+='\n## Executive Summary\n';
  out+='\nDuring this '+( scope.type||'penetration test')+' engagement for **'+client+'**, ';
  out+=(findings.length?findings.length+' security vulnerabilities were identified':'no security vulnerabilities were identified')+'. ';
  if(sevCounts.Critical)out+=sevCounts.Critical+' Critical';
  if(sevCounts.High)out+=(sevCounts.Critical?' and ':'')+sevCounts.High+' High-severity';
  if(sevCounts.Critical||sevCounts.High)out+=' issues require immediate remediation. ';
  out+=(openCount>0?openCount+' findings remain Open and require remediation before closure.':'All findings have been remediated.');
  out+='\n\n**Scope:** '+(scope.targets&&scope.targets.length?scope.targets.join(', '):'[Target systems]');
  out+='\n\n---\n';

  out+='\n## Findings Summary\n';
  out+='\n| # | Severity | CVSS | Finding | Status |\n';
  out+=  '|---|----------|------|---------|--------|\n';
  sorted.forEach(function(f,i){
    out+='| F'+(i+1)+' | '+f.severity+' | '+(f.cvss_score||'—')+' | '+(f.title||'Untitled')+' | '+(f.status||'Open')+' |\n';
  });

  out+='\n---\n\n## Detailed Findings\n';
  sorted.forEach(function(f,i){
    out+='\n### F'+(i+1)+': '+(f.title||'Untitled')+'\n';
    out+='\n**Severity:** '+f.severity+(f.cvss_score?' (CVSS '+f.cvss_score+')':'');
    if(f.cvss_vector)out+='  \n**CVSS Vector:** `'+f.cvss_vector+'`';
    if(f.affected)out+='  \n**Affected:** `'+f.affected+'`';
    if(f.mitre)out+='  \n**MITRE ATT&CK:** ['+f.mitre+' - '+(f.mitre_name||f.mitre)+'](https://attack.mitre.org/techniques/'+f.mitre.replace('.','/')+')';
    out+='  \n**Status:** '+( f.status||'Open');
    if(f.description)out+='\n\n#### Description\n'+f.description;
    if(f.business_impact)out+='\n\n#### Business Impact\n'+f.business_impact;
    if(f.evidence)out+='\n\n#### Evidence\n```\n'+f.evidence+'\n```';
    if(f.remediation)out+='\n\n#### Remediation\n'+f.remediation;
    out+='\n\n---';
  });

  // Notes from framework
  var noteKeys=Object.keys(APP.notes||{});
  if(noteKeys.length){
    out+='\n\n## Engagement Notes\n';
    noteKeys.forEach(function(k){
      if(APP.notes[k]&&APP.notes[k].trim()){
        out+='\n### '+k.replace('note_','').toUpperCase()+'\n'+APP.notes[k]+'\n';
      }
    });
  }

  if(APP.kcNarr){
    out+='\n\n## Attack Chain Narrative\n'+APP.kcNarr+'\n';
  }

  out+='\n\n---\n*Generated by PenTest Pro — Elite Framework*';
  return out;
}

function downloadReport(){

  var a=document.createElement('a');
  var client=(APP.scope&&APP.scope.client?APP.scope.client:APP.eng||'report').replace(/\s+/g,'-').toLowerCase();
  a.href=url;a.download='pentest-'+client+'-'+(new Date().toISOString().split('T')[0])+'.md';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderTimer(el){
  var sessions=APP.timerSessions||[];
  var active=APP.timerActive;
  var totals={};
  sessions.forEach(function(s){
    var dur=s.end-s.start;
    totals[s.phase]=(totals[s.phase]||0)+dur;
  });

  var h='<div class="sec-hdr"><div class="sec-title">&#9203; Time Tracker</div>'
    +'<button class="btn danger sm" onclick="clearTimerLog()">Clear Log</button></div>';

  var elapsedStr='00:00:00';
  if(active){
    var elapsed=Math.floor((Date.now()-active.start)/1000);
    var hh=Math.floor(elapsed/3600),mm=Math.floor((elapsed%3600)/60),ss=elapsed%60;
    elapsedStr=(hh<10?'0'+hh:hh)+':'+(mm<10?'0'+mm:mm)+':'+(ss<10?'0'+ss:ss);
  }

  h+='<div class="timer-display">'
    +'<div class="timer-clock">'+elapsedStr+'</div>'
    +'<div class="timer-phase-label">'+(active?'&#9210; '+esc(active.phase.toUpperCase()):'No timer running')+'</div>'
    +'<div class="timer-btns">';
  if(active){
    h+='<button class="btn danger" onclick="stopTimer()">&#9632; Stop</button>';
  }
  h+='</div></div>';

  h+='<div class="timer-phase-pick">';
  PHASES.forEach(function(p){
    h+='<button class="tph-btn'+(APP.timerSelPhase===p.id?' on':'')+'" onclick="APP.timerSelPhase=\''+p.id+'\';renderTimer(document.getElementById(\'secbody\'))" style="'+(APP.timerSelPhase===p.id?'border-color:'+p.color+';color:'+p.color+';background:rgba(0,0,0,.3)':'')+'">'
      +p.icon+' '+p.short+'</button>';
  });
  h+='</div>';

  if(!active){
    h+='<div style="padding:10px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0">'
      +'<button class="btn primary" onclick="startTimer()" style="width:100%">&#9654; Start Timer — '+esc((APP.timerSelPhase||'select phase').toUpperCase())+'</button>'
      +'</div>';
  }

  h+='<div class="timer-log">';
  if(!sessions.length){h+='<div class="empty">No sessions logged yet. Start a timer above.</div>';}
  else{
    var grouped={};
    sessions.forEach(function(s){if(!grouped[s.phase])grouped[s.phase]=0;grouped[s.phase]+=s.end-s.start;});
    Object.keys(grouped).forEach(function(phase){
      var ms=grouped[phase];
      var ph=PHASES.find(function(p){return p.id===phase;})||{color:'#475569',icon:'?'};
      h+='<div class="timer-row">'
        +'<span style="font-size:14px">'+ph.icon+'</span>'
        +'<span class="timer-row-ph">'+esc(phase)+'</span>'
        +'<span class="timer-row-dur" style="color:'+ph.color+'">'+fmtDur(ms)+'</span>'
        +'</div>';
    });
    sessions.slice().reverse().slice(0,10).forEach(function(s){
      var ph=PHASES.find(function(p){return p.id===s.phase;})||{color:'#475569',icon:'?'};
      h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid rgba(255,255,255,.03)">'
        +'<span style="font-size:12px;color:var(--t3)">'+ph.icon+'</span>'
        +'<span style="font-size:11px;color:var(--t2);flex:1">'+esc(s.phase)+'</span>'
        +'<span style="font-size:11px;color:var(--t3)">'+fmtDate(s.start)+'</span>'
        +'<span style="font-size:12px;font-weight:600;font-family:monospace">'+fmtDur(s.end-s.start)+'</span>'
        +'</div>';
    });
  }
  h+='</div>';

  var totalMs=0;
  sessions.forEach(function(s){totalMs+=s.end-s.start;});
  h+='<div class="timer-total">'
    +'<span class="timer-total-lbl">Total Engagement Time</span>'
    +'<span class="timer-total-val">'+fmtDur(totalMs)+'</span>'
    +'</div>';
  el.innerHTML=h;
}

function fmtDur(ms){
  var s=Math.floor(ms/1000),hh=Math.floor(s/3600),mm=Math.floor((s%3600)/60),ss=s%60;
  return (hh>0?hh+'h ':'')+(mm<10?'0'+mm:mm)+'m '+(ss<10?'0'+ss:ss)+'s';
}

function startTimer(){
  if(APP.timerActive)stopTimer();
  APP.timerActive={phase:APP.timerSelPhase,start:Date.now()};
  if(APP.timerInterval)clearInterval(APP.timerInterval);
  APP.timerInterval=setInterval(function(){
    if(APP.section==='timer')renderTimer(document.getElementById('secbody'));
  },1000);
  renderTimer(document.getElementById('secbody'));
}

function stopTimer(){
  if(!APP.timerActive)return;
  var session={phase:APP.timerActive.phase,start:APP.timerActive.start,end:Date.now()};
  APP.timerSessions.push(session);
  psave('timer_sessions',APP.timerSessions);
  APP.timerActive=null;
  if(APP.timerInterval){clearInterval(APP.timerInterval);APP.timerInterval=null;}
  if(APP.section==='timer')renderTimer(document.getElementById('secbody'));
}

function clearTimerLog(){
  if(!confirm('Clear all timer sessions?'))return;
  APP.timerSessions=[];
  psave('timer_sessions',[]);
  renderTimer(document.getElementById('secbody'));
}

  var fnCode="const Anthropic = require('@anthropic-ai/sdk');\n\nmodule.exports = async (req, res) => {\n  res.setHeader('Access-Control-Allow-Origin', '*');\n  res.setHeader('Access-Control-Allow-Methods', 'POST, OPTIONS');\n  res.setHeader('Access-Control-Allow-Headers', 'Content-Type');\n  if (req.method === 'OPTIONS') { res.status(200).end(); return; }\n\n  const { prompt } = req.body;\n  const client = new Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY });\n\n  const message = await client.messages.create({\n    model: 'claude-sonnet-4-6',\n    max_tokens: 1024,\n    messages: [{ role: 'user', content: prompt }]\n  });\n\n  res.json({ text: message.content[0].text });\n};";

  h+='<div class="code-block" id="vercelfn_code">'+esc(fnCode)+'</div></div></div>';

  // Framework settings
  h+='<div class="card"><div class="card-hdr"><div class="card-title">&#128295; Framework Settings</div></div><div class="card-body">'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn danger" onclick="doReset()" style="width:100%;justify-content:center">&#8635; Reset All Framework Progress (current profile)</button>'
    +'<button class="btn" onclick="exportAllData()" style="width:100%;justify-content:center">&#128229; Export All Data (JSON backup)</button>'
    +'</div></div></div>';

  h+='</div>';
  el.innerHTML=h;
}

function saveApiKey(){
  var key=document.getElementById('set_apikey').value.trim();
  var endpoint=document.getElementById('set_endpoint').value.trim()||'/api/chat';
  APP.apiKey=key;
  APP.apiEndpoint=endpoint;
  localStorage.setItem('api_key',key);
  localStorage.setItem('api_endpoint',endpoint);
  var st=document.getElementById('ai_status');
  if(st)st.textContent=key?'✓ Key saved':'No key';
  if(st)st.className='api-status '+(key?'ok':'');
}

function clearApiKey(){
  APP.apiKey='';
  localStorage.removeItem('api_key');
  document.getElementById('set_apikey').value='';
  var st=document.getElementById('ai_status');
  if(st){st.textContent='No key — features disabled';st.className='api-status';}
}

function testAI(){
  var result=document.getElementById('ai_test_result');
  if(result)result.textContent='Testing...';
  aiCall('Say only: "PenTest Pro AI connection successful!"',
    function(text){if(result)result.textContent='✓ '+text;},
    function(err){if(result)result.textContent='✗ Error: '+err;});
}

function copyVercelFn(){
  var el=document.getElementById('vercelfn_code');
  if(el)copy(el.innerText,document.querySelector('.card-hdr .btn'));
}

function exportAllData(){
  var data={profiles:APP.profiles,current:APP.profile,data:{}};
  APP.profiles.forEach(function(p){
    var keys=['ck','notes','eng','phase','step','findings','scope','timer_sessions','kc','kc_narr'];
    data.data[p.id]={};
    keys.forEach(function(k){
      var v=localStorage.getItem('apt_'+p.id+'_'+k);
      if(v)try{data.data[p.id][k]=JSON.parse(v);}catch(e){}
    });
  });
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='pentest-pro-backup-'+(new Date().toISOString().split('T')[0])+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}


window.addEventListener('DOMContentLoaded',function(){
  initData();
  APP.profile=localStorage.getItem('apt_profile')||'default';
  loadProfile();
  setSection('framework');
  var pnav=document.getElementById('phasenav');
  if(pnav)pnav.style.display='';
  var wrap=document.getElementById('wrap');
  if(wrap)wrap.style.display='';
  var bn=document.getElementById('bottomnav');
  if(bn)bn.style.display='';
});

</script>
