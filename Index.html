<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PenTest Pro">
<meta name="theme-color" content="#040810">
<title>PenTest Pro</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px)}
html,body{height:100%;overflow:hidden;background:#040810;color:#e2e8f0;-webkit-text-size-adjust:100%}
body{font-family:"SF Mono","Fira Code",monospace;font-size:14px}
#root{height:100dvh;height:-webkit-fill-available;display:flex;flex-direction:column;overflow:hidden;padding-left:var(--sal)}
#topbar{background:#060d18;border-bottom:1px solid #152236;padding:8px 12px;padding-top:calc(8px + var(--sat));display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;min-height:48px}
#phasenav{background:#060d18;border-bottom:1px solid #152236;display:flex;overflow-x:auto;flex-shrink:0;min-height:44px;scrollbar-width:none}
#phasenav::-webkit-scrollbar,#bottomnav::-webkit-scrollbar,#tabbar::-webkit-scrollbar{display:none}
#wrap{flex:1;display:flex;overflow:hidden;position:relative}
#mask{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:99;display:none}
#mask.on{display:block}
#drawer{position:absolute;top:0;left:0;height:100%;width:268px;background:#060d18;border-right:1px solid #152236;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:100;transform:translateX(-101%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
#drawer.on{transform:translateX(0)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#stephdr{padding:12px 14px;border-bottom:1px solid #152236;background:#060d18;flex-shrink:0}
#tabbar{display:flex;border-bottom:1px solid #152236;background:#060d18;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#tabcontent{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px}
#stepnav{border-top:1px solid #152236;background:#060d18;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#bottomnav{background:#040810;border-top:1px solid #0a1628;display:flex;overflow-x:auto;padding-bottom:calc(6px + var(--sab));flex-shrink:0;scrollbar-width:none}
.phtab,.bni{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px}
.phtab{padding:5px 10px;min-width:66px;min-height:44px}.bni{padding:5px 8px 3px;min-width:58px;flex-shrink:0}
.tabbtn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;cursor:pointer;font-family:inherit;color:#475569;font-size:11px;white-space:nowrap;min-height:44px}
.tabbtn.on{color:#e2e8f0;font-weight:700}
.cbtn{background:none;border:1px solid #152236;border-radius:5px;color:#94a3b8;cursor:pointer;font-family:inherit;padding:5px 12px;font-size:11px;min-height:36px}
.copybtn{background:#162540;border:none;border-radius:4px;color:#64748b;font-size:10px;padding:3px 8px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.copybtn.ok{background:#16a34a;color:#fff}
.cmdblock{background:#060f1c;border:1px solid #1a3050;border-radius:8px;overflow:hidden;margin-bottom:10px}
.cmdhdr{padding:10px 14px;border-bottom:1px solid #0f2040;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cmdpre{padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmdpre pre{margin:0;font-size:11px;color:#7dd3fc;line-height:1.7;font-family:inherit;white-space:pre-wrap;word-break:break-word}
.cmdex{padding:6px 14px 10px;border-top:1px solid #0f2040}
.detog{width:100%;background:none;border:none;border-top:1px solid #0f2040;padding:7px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:inherit;color:#475569;font-size:9px;text-transform:uppercase;letter-spacing:.08em;min-height:36px}
.deblk{padding:0 14px 12px}
.flagrow{display:flex;gap:8px;margin-bottom:4px;align-items:flex-start}
.flagcode{font-size:9px;color:#f472b6;background:#1a0a1f;padding:1px 5px;border-radius:3px;flex-shrink:0;font-family:inherit}
.notebox{background:#1a1000;border:1px solid #3d2900;border-radius:4px;padding:6px 10px;margin-bottom:6px;font-size:10px;color:#fde68a;line-height:1.5}
.outbox{background:#021408;border:1px solid #14532d;border-radius:4px;padding:6px 10px;font-size:10px;color:#86efac;line-height:1.5}
.chkitem{padding:11px 14px;border-bottom:1px solid #0a1e34;display:flex;align-items:flex-start;gap:10px;cursor:pointer;min-height:44px;-webkit-user-select:none;user-select:none}
.chkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid #334155;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;margin-top:1px}
.chkbox.on{background:#16a34a;border-color:#16a34a}
.pribadge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;color:#fff;flex-shrink:0}
.pbar{height:4px;background:#152236;border-radius:2px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:2px;transition:width .3s}
.tipbox{background:#1a1000;border:1px solid #854d0e;border-radius:8px;padding:12px 14px;margin-bottom:12px;display:flex;gap:10px}
.toolchip{font-size:10px;background:#0f2040;border:1px solid #1e3a5f;color:#60a5fa;padding:3px 9px;border-radius:4px;display:inline-block;margin:2px}
.sdot{width:8px;height:8px;border-radius:50%;cursor:pointer;flex-shrink:0}
.drwhdr{padding:8px 12px;border-bottom:1px solid #152236;position:sticky;top:0;background:#060d18}
.drwbtn{width:100%;background:none;border:none;border-left:2px solid transparent;border-bottom:1px solid #0a1628;padding:10px 12px;text-align:left;cursor:pointer;font-family:inherit;min-height:44px}
.drwbtn.on{background:#0f2040}
#err{position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fca5a5;padding:16px;font-size:12px;z-index:9999;word-break:break-all;display:none;white-space:pre-wrap;font-family:monospace}
</style>
</head>
<body>

  <div id="topbar"></div>
  <div id="phasenav"></div>
  <div id="wrap">
    <div id="mask" onclick="closeDrawer()"></div>
    <div id="drawer"></div>
    <div id="main">
      <div id="stephdr"></div>
      <div id="tabbar"></div>
      <div id="tabcontent"></div>
      <div id="stepnav"></div>
    </div>
  </div>
  <div id="bottomnav"></div>
</div>

var CR={},ALLCMDS={};
if(PHASES){PHASES.forEach(function(ph){ph.steps.forEach(function(s){
  if(s.commands){s.commands.forEach(function(c){CR[c.id]=c.example||c.cmd;});}
  if(s.commands&&s.commands.length){ALLCMDS[s.id]=s.commands.map(function(c){return c.cmd;}).join("\n\n# ────\n\n");}
});});}

var PCOL={critical:"#dc2626",high:"#ea580c",medium:"#b45309",low:"#16a34a"};
var S={phase:"pre",step:"p1",tab:"cmd",ck:{},notes:{},eng:"New Engagement",drawer:false,exp:{}};
var PH,ST;

function save(){try{localStorage.setItem("pts6",JSON.stringify({ck:S.ck,notes:S.notes,eng:S.eng}));}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem("pts6")||"{}");S.ck=d.ck||{};S.notes=d.notes||{};S.eng=d.eng||"New Engagement";}catch(e){}}
function sP(s){if(!s.checklist||!s.checklist.length)return 0;var d=0;for(var i=0;i<s.checklist.length;i++){if(S.ck[s.id+"-"+i])d++;}return Math.round(d/s.checklist.length*100);}
function phP(ph){var all=[],d=0;ph.steps.forEach(function(s){if(s.checklist)for(var i=0;i<s.checklist.length;i++)all.push(s.id+"-"+i);});for(var i=0;i<all.length;i++)if(S.ck[all[i]])d++;return all.length?Math.round(d/all.length*100):0;}
function totP(){var all=[],d=0;if(!PHASES)return{pct:0};PHASES.forEach(function(p){p.steps.forEach(function(s){if(s.checklist)for(var i=0;i<s.checklist.length;i++){all.push(s.id+"-"+i);if(S.ck[s.id+"-"+i])d++;}});});return{pct:all.length?Math.round(d/all.length*100):0};}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pbar(pct,col){return'<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+(pct===100?"#22c55e":col)+'"></div></div>';}
function pbadge(p){var c=PCOL[p]||"#475569";return'<span class="pribadge" style="background:'+c+'">'+p[0].toUpperCase()+'</span>';}
function cp(txt,btn){if(!navigator.clipboard){showErr("Clipboard not available — serve via HTTPS");return;}navigator.clipboard.writeText(txt||"").then(function(){var t=btn.textContent;btn.textContent="✓";btn.classList.add("ok");setTimeout(function(){btn.textContent=t;btn.classList.remove("ok");},1500);}).catch(function(e){showErr("Copy failed: "+e);});}
function doCopy(id,btn){cp(CR[id],btn);}
function copyAll(sid,btn){cp(ALLCMDS[sid]||"",btn);}
function openDrawer(){S.drawer=true;document.getElementById("drawer").classList.add("on");document.getElementById("mask").classList.add("on");}
function closeDrawer(){S.drawer=false;document.getElementById("drawer").classList.remove("on");document.getElementById("mask").classList.remove("on");}
function toggleDrawer(){if(S.drawer)closeDrawer();else openDrawer();}
function selPhase(id){S.phase=id;PH=null;for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===id){PH=PHASES[i];break;}}if(!PH)PH=PHASES[0];S.step=PH.steps[0].id;ST=PH.steps[0];S.tab="cmd";closeDrawer();renderAll();}
function selStep(id){S.step=id;ST=null;for(var i=0;i<PH.steps.length;i++){if(PH.steps[i].id===id){ST=PH.steps[i];break;}}if(!ST)ST=PH.steps[0];S.tab="cmd";closeDrawer();renderAll();}
function selTab(t){S.tab=t;document.getElementById("tabcontent").innerHTML=rTab();document.getElementById("tabbar").innerHTML=rTabBar();}
function togCk(k){S.ck[k]=!S.ck[k];save();document.getElementById("stephdr").innerHTML=rStepHdr();document.getElementById("tabcontent").innerHTML=rTab();document.getElementById("drawer").innerHTML=rDrawer();}
function togAll(){var ids=[];if(ST.checklist)for(var i=0;i<ST.checklist.length;i++)ids.push(ST.id+"-"+i);var nd=!ids.every(function(k){return S.ck[k];});for(var i=0;i<ids.length;i++)S.ck[ids[i]]=nd;save();document.getElementById("tabcontent").innerHTML=rTab();document.getElementById("stephdr").innerHTML=rStepHdr();}
function togExp(id){S.exp[id]=!S.exp[id];document.getElementById("tabcontent").innerHTML=rTab();}
function saveNote(v){S.notes[ST.id]=v;save();}
function navStep(d){var steps=PH.steps;var idx=0;for(var i=0;i<steps.length;i++){if(steps[i].id===S.step){idx=i;break;}}if(idx+d>=0&&idx+d<steps.length)selStep(steps[idx+d].id);}
function startEditEng(){var sp=document.getElementById("engspan");if(!sp)return;sp.outerHTML='<input id="enginput" class="enginput" value="'+esc(S.eng)+'" onblur="finishEng(this.value)" onkeydown="if(event.key===&quot;Enter&quot;)this.blur()" style="background:#0f2040;border:1px solid #3b82f6;border-radius:4px;padding:2px 8px;color:#93c5fd;font-size:12px;outline:none;font-family:inherit;max-width:155px">';setTimeout(function(){var el=document.getElementById("enginput");if(el)el.focus();},0);}
function finishEng(v){S.eng=v||"New Engagement";save();document.getElementById("topbar").innerHTML=rTopbar();}
function doReset(){if(confirm("Reset all progress?")){S.ck={};S.notes={};save();renderAll();}}
function rTopbar(){var pct=totP().pct;return'<div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1"><button onclick="toggleDrawer()" style="background:'+(S.drawer?"#1e3a5f":"none")+';border:1px solid #152236;border-radius:5px;color:#94a3b8;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#9776;</button><div style="display:flex;gap:4px;flex-shrink:0"><div style="width:7px;height:7px;border-radius:50%;background:#ef4444"></div><div style="width:7px;height:7px;border-radius:50%;background:#eab308"></div><div style="width:7px;height:7px;border-radius:50%;background:#22c55e"></div></div><span id="engspan" onclick="startEditEng()" style="color:#93c5fd;font-size:12px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:155px">&#128193; '+esc(S.eng)+' &#9998;</span></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><div style="text-align:right"><div style="font-size:9px;color:#475569">TOTAL</div><div style="font-size:14px;font-weight:700;color:#22c55e;line-height:1">'+pct+'<span style="font-size:9px;color:#475569">%</span></div></div><button onclick="doReset()" style="background:none;border:1px solid #450a0a;border-radius:4px;color:#f87171;cursor:pointer;font-family:inherit;padding:4px 8px;font-size:11px;min-height:36px">&#8635;</button></div>';}
function rPhaseNav(){if(!PHASES)return"";var h="";for(var i=0;i<PHASES.length;i++){var ph=PHASES[i];var pp=phP(ph);var ac=ph.id===S.phase;h+='<button class="phtab" style="color:'+(ac?ph.color:"#475569")+';border-bottom-color:'+(ac?ph.color:"transparent")+'" onclick="selPhase('+"'"+ph.id+"'"+')"><span style="font-size:13px">'+ph.icon+'</span><span style="font-size:9px;font-weight:'+(ac?700:400)+'">'+ph.short+'</span><span style="font-size:8px;color:'+(pp===100?"#22c55e":ac?ph.color:"#475569")+'">'+pp+'%</span></button>';}return h;}
function rDrawer(){if(!PH)return"";var h='<div class="drwhdr" style="background:'+PH.color+"15"+'"><div style="font-size:9px;color:'+PH.color+';text-transform:uppercase;font-weight:700;letter-spacing:.1em">'+PH.icon+" "+esc(PH.label)+'</div><div style="font-size:9px;color:#475569;margin-top:2px">'+esc(PH.desc)+'</div></div>';for(var i=0;i<PH.steps.length;i++){var s=PH.steps[i];var sp=sP(s);var ac=s.id===S.step;h+='<button class="drwbtn'+(ac?" on":"")+'" style="border-left-color:'+(ac?PH.color:"transparent")+'" onclick="selStep('+"'"+s.id+"'"+')"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px"><span style="font-size:11px;font-weight:'+(ac?700:400)+';color:'+(ac?"#f1f5f9":"#94a3b8")+';line-height:1.3">'+esc(s.title)+'</span>'+pbadge(s.priority)+'</div>'+pbar(sp,PH.color)+'</button>';}return h;}
function rStepHdr(){if(!ST)return"";var sp=sP(ST);return'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px"><span style="font-size:9px;color:'+PH.color+';text-transform:uppercase;letter-spacing:.1em;font-weight:700">'+PH.icon+" "+esc(PH.label)+'</span>'+pbadge(ST.priority)+'</div><h2 style="font-size:15px;font-weight:700;color:#f1f5f9;line-height:1.2;margin:0 0 4px">'+esc(ST.title)+'</h2><p style="font-size:11px;color:#94a3b8;line-height:1.4;margin:0">'+esc(ST.summary)+'</p></div><div style="text-align:right;flex-shrink:0"><div style="font-size:9px;color:#475569">STEP</div><div style="font-size:14px;font-weight:700;color:'+(sp===100?"#22c55e":PH.color)+'">'+sp+'%</div></div></div>'+pbar(sp,PH.color);}
function rTabBar(){var tabs=["cmd","chk","inf","nts"];var lbl={cmd:"&#9889; Commands",chk:"&#9745; Checklist",inf:"&#8505; Info",nts:"Notes"};var h="";for(var i=0;i<tabs.length;i++){var t=tabs[i];h+='<button class="tabbtn'+(S.tab===t?" on":"")+'" style="border-bottom-color:'+(S.tab===t?PH.color:"transparent")+'" onclick="selTab('+"'"+t+"'"+')">'+lbl[t]+'</button>';}return h;}
function rCmd(cmd){var ex=S.exp[cmd.id];var hd=!!(cmd.flags&&cmd.flags.length||cmd.note||cmd.out);var h='<div class="cmdblock"><div class="cmdhdr"><div style="min-width:0"><div style="font-size:11px;font-weight:700;color:#06b6d4;margin-bottom:2px">'+esc(cmd.title)+'</div><div style="font-size:10px;color:#64748b">'+esc(cmd.purpose)+'</div></div><button class="copybtn" onclick="doCopy('+"'"+cmd.id+"'"+',this)">&#9673; Copy</button></div><div class="cmdpre"><pre>'+esc(cmd.cmd)+'</pre></div>';if(cmd.example&&cmd.example!==cmd.cmd)h+='<div class="cmdex"><div style="font-size:9px;color:#475569;text-transform:uppercase;margin-bottom:3px">Example</div><pre style="margin:0;font-size:10px;color:#a3e635;font-family:inherit;white-space:pre-wrap;word-break:break-word">'+esc(cmd.example)+'</pre></div>';if(hd){h+='<button class="detog" onclick="togExp('+"'"+cmd.id+"'"+')"><span>Flags + Details</span><span>'+(ex?"^":"v")+'</span></button>';if(ex){var fl="";var flags=cmd.flags||[];for(var i=0;i<flags.length;i++)fl+='<div class="flagrow"><span class="flagcode">'+esc(flags[i].f)+'</span><span style="font-size:10px;color:#94a3b8">'+esc(flags[i].d)+'</span></div>';h+='<div class="deblk">'+fl+(cmd.note?'<div class="notebox"><b style="color:#f59e0b">! </b>'+esc(cmd.note)+'</div>':"")+( cmd.out?'<div class="outbox"><b style="color:#22c55e">-&gt; </b>'+esc(cmd.out)+'</div>':"")+ '</div>';}}return h+'</div>';}
function rCmds(){if(!ST||!ST.commands||!ST.commands.length)return'<div style="color:#475569;font-size:12px;padding:20px;text-align:center">Process step - see Checklist and Info tabs.</div>';var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em">&#9889; '+ST.commands.length+' Commands</span><button class="copybtn" onclick="copyAll('+"'"+ST.id+"'"+',this)">&#9673; All</button></div>';for(var i=0;i<ST.commands.length;i++)h+=rCmd(ST.commands[i]);if(ST.tools&&ST.tools.length){var tc="";for(var i=0;i<ST.tools.length;i++)tc+='<span class="toolchip">'+esc(ST.tools[i])+'</span>';h+='<div style="background:#0a1628;border:1px solid #152236;border-radius:8px;padding:10px 14px;margin-top:4px"><div style="font-size:9px;color:#475569;text-transform:uppercase;margin-bottom:8px">Tools</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+tc+'</div></div>';}return h;}
function rChk(){if(!ST||!ST.checklist||!ST.checklist.length)return'<div style="color:#475569;text-align:center;padding:20px">No checklist.</div>';var allD=true;for(var i=0;i<ST.checklist.length;i++){if(!S.ck[ST.id+"-"+i]){allD=false;break;}}var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:10px;color:#475569;text-transform:uppercase">&#9745; '+ST.checklist.length+' Items</span><button class="cbtn" onclick="togAll()">'+( allD?"Uncheck All":"Check All")+'</button></div><div style="background:#0a1628;border:1px solid #152236;border-radius:8px;overflow:hidden">';for(var i=0;i<ST.checklist.length;i++){var k=ST.id+"-"+i;var d=!!S.ck[k];h+='<div class="chkitem" style="background:'+(d?"#021408":i%2?"#080e1a":"transparent")+'" onclick="togCk('+"'"+k+"'"+')"><div class="chkbox'+(d?" on":"")+'">'+( d?"&#10003;":"")+'</div><span style="font-size:12px;color:'+(d?"#4b7a5a":"#94a3b8")+';text-decoration:'+(d?"line-through":"none")+';line-height:1.4">'+esc(ST.checklist[i])+'</span></div>';}h+='</div>';if(ST.deliverable)h+='<div style="background:#0a1628;border:1px solid #152236;border-radius:8px;padding:10px 14px;margin-top:12px"><div style="font-size:9px;color:#475569;text-transform:uppercase;margin-bottom:4px">Deliverable</div><div style="font-size:11px;color:#f1f5f9">'+esc(ST.deliverable)+'</div></div>';return h;}
function rInf(){if(!ST)return"";var h="";if(ST.tip)h+='<div class="tipbox"><span style="font-size:18px;flex-shrink:0">&#128161;</span><div><div style="font-size:9px;color:#854d0e;text-transform:uppercase;font-weight:700;margin-bottom:4px">Pro Tip</div><div style="font-size:12px;color:#fde68a;line-height:1.5">'+esc(ST.tip)+'</div></div></div>';if(ST.tools&&ST.tools.length){var tc="";for(var i=0;i<ST.tools.length;i++)tc+='<span class="toolchip">'+esc(ST.tools[i])+'</span>';h+='<div style="background:#0a1628;border:1px solid #152236;border-radius:8px;padding:10px 14px;margin-bottom:12px"><div style="font-size:9px;color:#475569;text-transform:uppercase;margin-bottom:8px">Tools</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+tc+'</div></div>';}if(ST.deliverable)h+='<div style="background:#0a1628;border:1px solid #152236;border-radius:8px;padding:10px 14px"><div style="font-size:9px;color:#475569;text-transform:uppercase;margin-bottom:6px">Deliverable</div><div style="font-size:12px;color:#f1f5f9;line-height:1.5">'+esc(ST.deliverable)+'</div></div>';return h||'<div style="color:#475569;text-align:center;padding:20px">See Checklist tab.</div>';}
function rNts(){if(!ST)return"";var note=S.notes[ST.id]||"";return'<div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Notes - '+esc(ST.title)+'</div><textarea oninput="saveNote(this.value)" style="width:100%;background:#0a1628;border:1px solid #152236;border-radius:8px;padding:12px;color:#94a3b8;font-size:16px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;line-height:1.6;min-height:180px" placeholder="Record findings, IPs, credentials, tool output...">'+esc(note)+'</textarea><div style="font-size:9px;color:#475569;margin-top:6px">'+note.length+' chars</div>';}
function rTab(){if(S.tab==="cmd")return rCmds();if(S.tab==="chk")return rChk();if(S.tab==="inf")return rInf();if(S.tab==="nts")return rNts();return"";}
function rStepNav(){if(!PH||!ST)return"";var steps=PH.steps;var idx=0;for(var i=0;i<steps.length;i++){if(steps[i].id===S.step){idx=i;break;}}var dots="";for(var i=0;i<steps.length;i++){var sp=sP(steps[i]);dots+='<div class="sdot" onclick="selStep('+"'"+steps[i].id+"'"+')" style="background:'+(steps[i].id===S.step?PH.color:sp===100?"#22c55e":"#152236")+'"></div>';}return'<button class="cbtn" onclick="navStep(-1)"'+(idx===0?' disabled style="opacity:.3"':"")+ '>&#8592; Prev</button><div style="display:flex;gap:5px;align-items:center">'+dots+'</div><button class="cbtn" onclick="navStep(1)"'+(idx===steps.length-1?' disabled style="opacity:.3"':"")+ '>Next &#8594;</button>';}
function rBN(){if(!PHASES)return"";var h="";for(var i=0;i<PHASES.length;i++){var ph=PHASES[i];var pp=phP(ph);var ac=ph.id===S.phase;h+='<button class="bni" style="color:'+(ac?ph.color:"#475569")+';border-bottom-color:'+(ac?ph.color:"transparent")+'" onclick="selPhase('+"'"+ph.id+"'"+')"><span style="font-size:13px">'+ph.icon+'</span><span style="font-size:8px;font-weight:'+(ac?700:400)+';white-space:nowrap;color:'+(ac?ph.color:"#475569")+'">'+ph.short+'</span><span style="font-size:8px;color:'+(pp===100?"#22c55e":ac?ph.color:"#475569")+'">'+pp+'%</span></button>';}return h;}
function renderAll(){
  if(!PHASES){showErr("PHASES not loaded");return;}
  PH=null;for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===S.phase){PH=PHASES[i];break;}}
  if(!PH)PH=PHASES[0];
  ST=null;for(var i=0;i<PH.steps.length;i++){if(PH.steps[i].id===S.step){ST=PH.steps[i];break;}}
  if(!ST)ST=PH.steps[0];
  var ids=["topbar","phasenav","drawer","stephdr","tabbar","tabcontent","stepnav","bottomnav"];
  var fns=[rTopbar,rPhaseNav,rDrawer,rStepHdr,rTabBar,rTab,rStepNav,rBN];
  for(var i=0;i<ids.length;i++){
    try{document.getElementById(ids[i]).innerHTML=fns[i]();}
    catch(e){showErr("Render error in "+ids[i]+": "+e.message+"\n"+e.stack);}
  }
}

try{load();}catch(e){showErr("load() failed: "+e.message);}
try{renderAll();}catch(e){showErr("renderAll() failed: "+e.message+"\n"+e.stack);}
document.body.addEventListener("touchmove",function(e){if(e.target===document.body)e.preventDefault();},{passive:false});
</script>
